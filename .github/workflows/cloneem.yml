name: Clone Backup Matrix (Read-Write Separation Mode)

on:
  workflow_run:
    workflows:
      - "Clone Backup Repositories F"
    types:
      - completed
      
  workflow_dispatch:

# 核心安全声明：授予 Actions 自带 Token 写入当前仓 Release 的权限
permissions:
  contents: write

jobs:
  # ==========================================
  # 第一阶段：准备工作（拉取上游，只读操作）
  # ==========================================
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix_jobs: ${{ steps.generate-matrix.outputs.matrix_jobs }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y jq yq gh

      - name: Generate Granular Matrix (Filter Drafts)
        id: generate-matrix
        env:
          GITHUB_TOKEN: ${{ secrets.MY_TOKEN }} # 准备阶段依然用你的 PAT 去扫上游
        run: |
          set -euo pipefail
          
          sanitize() { echo "$1" | tr '/' '-' | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9._-]/-/g' | sed 's/-\+/-/g' | sed 's/^-//;s/-$//'; }

          # 1. 获取黑名单
          mapfile -t EXCLUDES < <(yq -r '.exclude[]?' repositoriese.yaml 2>/dev/null | grep -v '^[[:space:]]*#' | sed '/^[[:space:]]*$/d' || true)
          declare -A EXCLUDE_MAP
          for ex in "${EXCLUDES[@]}"; do EXCLUDE_MAP["$ex"]=1; done

          declare -A TARGET_REPOS

          # 2. 获取目标仓库
          mapfile -t OWNERS < <(yq -r '.allrepositories[]?' repositoriese.yaml 2>/dev/null | grep -v '^[[:space:]]*#' | sed '/^[[:space:]]*$/d' || true)
          for owner in "${OWNERS[@]}"; do
            [[ -z "$owner" ]] && continue
            mapfile -t repos < <(gh repo list "$owner" --public -L 1000 --json nameWithOwner -q '.[].nameWithOwner' 2>/dev/null || true)
            for r in "${repos[@]}"; do [[ -z "${EXCLUDE_MAP[$r]:-}" ]] && TARGET_REPOS["$r"]=1; done
          done
          mapfile -t MANUAL_REPOS < <(yq -r '.repositories | [.*[]] | flatten | .[]' repositoriese.yaml 2>/dev/null | grep -v '^[[:space:]]*#' | sed '/^[[:space:]]*$/d' || true)
          for r in "${MANUAL_REPOS[@]}"; do
            [[ -z "$r" ]] && continue
            [[ -z "${EXCLUDE_MAP[$r]:-}" ]] && TARGET_REPOS["$r"]=1
          done

          JOBS_ARRAY="[]"
          
          # 3. 生成矩阵
          for repo in "${!TARGET_REPOS[@]}"; do
            echo "----------------------------------------"
            echo "🔍 Sweeping Repository: $repo"
            
            item=$(jq -n --arg r "$repo" --arg task "branch" '{repo: $r, task: $task, tag: "none"}')
            JOBS_ARRAY=$(echo "$JOBS_ARRAY" | jq --argjson item "$item" '. + [$item]')
            
            mapfile -t tags < <(gh release list --repo "$repo" --limit 1000 --json tagName,isDraft -q '.[] | select(.isDraft == false) | .tagName' 2>/dev/null || true)
            echo "  -> Found Upstream Total Published Releases: ${#tags[@]}"
            
            for tag in "${tags[@]}"; do
              [[ -z "$tag" || "$tag" == "null" ]] && continue
              item=$(jq -n --arg r "$repo" --arg t "$tag" --arg task "release" '{repo: $r, task: $task, tag: $t}')
              JOBS_ARRAY=$(echo "$JOBS_ARRAY" | jq --argjson item "$item" '. + [$item]')
            done
          done

          FINAL_ARRAY=$(echo "$JOBS_ARRAY" | jq -c '.[0:250]')
          if [[ "$FINAL_ARRAY" == "[]" || -z "$FINAL_ARRAY" ]]; then
            FINAL_ARRAY='[{"repo": "empty", "task": "empty", "tag": "empty"}]'
          fi
          
          echo "matrix_jobs<<EOF" >> $GITHUB_OUTPUT
          echo "$FINAL_ARRAY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  # ==========================================
  # 第二阶段：并发执行（读写分离核心层）
  # ==========================================
  backup_worker:
    needs: prepare
    runs-on: ubuntu-latest
    # 同样在 Job 级别确保权限就位
    permissions:
      contents: write
    strategy:
      fail-fast: false      
      max-parallel: 4  # 降低至 4，配合读写分离，彻底根治二次限速 (Secondary Rate Limit)
      matrix:
        job: ${{ fromJson(needs.prepare.outputs.matrix_jobs) }}
        
    steps:
      - name: Skip if empty
        if: matrix.job.task == 'empty'
        run: echo "No tasks." && exit 0

      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }} # 使用自带 Token 签出

      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y jq gh git curl p7zip-full

      - name: Execute Full Overwrite Backup Task
        env:
          # 【读写分离关键配置】
          UPSTREAM_TOKEN: ${{ secrets.MY_TOKEN }}      # 专用于对外交涉、下载数据
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}    # 专用于本地仓写入（gh 工具会自动识别此变量进行 Release 操纵）
          REPO: ${{ matrix.job.repo }}
          TASK: ${{ matrix.job.task }}
          TAG: ${{ matrix.job.tag }}
        run: |
          set -euo pipefail
          sanitize() { echo "$1" | tr '/' '-' | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9._-]/-/g' | sed 's/-\+/-/g' | sed 's/^-//;s/-$//'; }
          safe_upload() {
            local file="$1" tag="$2" retries=3
            while [ $retries -gt 0 ]; do
              echo "Uploading: $file (Retries left: $retries)"
              if gh release upload "$tag" "$file" --repo "$GITHUB_REPOSITORY" --clobber 2>/dev/null; then return 0; fi
              retries=$((retries - 1)); sleep 5
            done
            echo "❌ UPLOAD FAILED: $file" && return 1
          }

          REPO_SLUG=$(sanitize "$REPO")
          NOW_DATE=$(date +"%Y%m%d")
          NOW_HUMAN=$(date +"%Y-%m-%d %H:%M")
          mkdir -p tmp

          # 错峰延时：让 4 个并发 Runner 之间再错开几秒，防止同时向当前仓发 API 请求
          echo "⏳ Injecting random jitter to prevent anti-abuse rate limits..."
          sleep $((RANDOM % 10 + 1))

          # ============================================
          # 任务分支A：备份源码分支
          # ============================================
          if [[ "$TASK" == "branch" ]]; then
            MIRROR="tmp/${REPO_SLUG}.git"
            echo "🔽 Forced Cloning repository branches using UPSTREAM_TOKEN..."
            # 鉴权变更为使用 UPSTREAM_TOKEN 拉取外部上游
            git clone --mirror "https://x-access-token:${UPSTREAM_TOKEN}@github.com/${REPO}.git" "$MIRROR"
            
            BRANCH_TAG="${REPO_SLUG}-branches-${NOW_DATE}"
            
            echo "♻️ Cleaning branch release for today: $BRANCH_TAG"
            gh release delete "$BRANCH_TAG" --repo "$GITHUB_REPOSITORY" -y 2>/dev/null || true
            
            mapfile -t BRANCHES < <(git -C "$MIRROR" for-each-ref --sort=-committerdate --format='%(refname:short)' refs/heads 2>/dev/null || true)
            BRANCHES=("${BRANCHES[@]:0:10}")
            
            FILES=()
            for B in "${BRANCHES[@]}"; do
              B_SLUG=$(sanitize "$B")
              DIR="tmp/export/${B_SLUG}"
              mkdir -p "$DIR"
              git -C "$MIRROR" archive "$B" | tar -xf - -C "$DIR" 2>/dev/null || continue
              ARCHIVE="${REPO_SLUG}-${B_SLUG}.7z"
              7z a -t7z -mx5 -mmt2 -v1500m "$ARCHIVE" "$DIR" >/dev/null 2>&1 || true
              for f in "${ARCHIVE}"*; do
                if [[ -f "$f" ]]; then
                  sha256sum "$f" > "${f}.sha256" 2>/dev/null || true
                  FILES+=("$f" "${f}.sha256")
                fi
              done
            done
            
            if [[ ${#FILES[@]} -gt 0 ]]; then
              NOTES="## 📦 Full Branch Backup\n- Repo: $REPO\n- Refreshed: $NOW_HUMAN"
              gh release create "$BRANCH_TAG" "${FILES[0]}" --repo "$GITHUB_REPOSITORY" --title "📦 Branches of $REPO_SLUG ($NOW_DATE)" --notes "$NOTES"
              for ((i=1; i<${#FILES[@]}; i++)); do safe_upload "${FILES[$i]}" "$BRANCH_TAG"; done
            fi

          # ============================================
          # 任务分支B：备份指定的 Release
          # ============================================
          elif [[ "$TASK" == "release" ]]; then
            # 【修改点】使用 UPSTREAM_TOKEN 去拉取上游 API 数据，保护 GITHUB_TOKEN 配额
            RELEASE_JSON=$(curl -fsSL -H "Authorization: Bearer $UPSTREAM_TOKEN" "https://api.github.com/repos/$REPO/releases/tags/$TAG" 2>/dev/null || echo "{}")
            
            if [[ "$(echo "$RELEASE_JSON" | jq -r '.draft // false')" == "true" ]]; then
              echo "⚠️ Upstream release is a Draft! Skipping..."
              exit 0
            fi

            IS_PRE=$(echo "$RELEASE_JSON" | jq -r '.prerelease // false')
            EXTRA_FLAG=""
            if [[ "$IS_PRE" == "true" ]]; then EXTRA_FLAG="--prerelease"; fi

            TAG_SLUG=$(sanitize "$TAG")
            PER_RELEASE_TAG="${REPO_SLUG}-${TAG_SLUG}-${NOW_DATE}"
            
            # 以下 gh 操作由于环境中已经将本地 GITHUB_TOKEN 绑定，将直接无感调用当前仓权限，不再损耗你的个人 PAT
            gh release delete "$PER_RELEASE_TAG" --repo "$GITHUB_REPOSITORY" -y 2>/dev/null || true

            NOTES_FILE=$(mktemp)
            echo -e "## 🏷 Upstream Release: $TAG\n- Repo: $REPO\n- Backup Time: $NOW_HUMAN\n\n## 📝 Body\n$(echo "$RELEASE_JSON" | jq -r '.body // "No description"')" > "$NOTES_FILE"
            
            FIRST_ASSET_CREATED=false
            error_occurred=0

            echo "$RELEASE_JSON" | jq -c '.assets[]? | select(.name != null and .browser_download_url != null)' 2>/dev/null | while read -r asset; do
              [[ -z "$asset" ]] && continue
              
              ASSET_NAME=$(echo "$asset" | jq -r '.name')
              ASSET_URL=$(echo "$asset" | jq -r '.browser_download_url')
              LOCAL_FILE="tmp/up-${ASSET_NAME}"
              
              echo "⬇️ Downloading asset: $ASSET_NAME"
              if ! curl -L --fail --silent --show-error --connect-timeout 30 --retry 5 --retry-delay 10 -o "$LOCAL_FILE" "$ASSET_URL"; then
                echo "❌ Download failed for $ASSET_NAME"
                error_occurred=1
                continue
              fi
              
              if [[ "$FIRST_ASSET_CREATED" == "false" ]]; then
                if gh release create "$PER_RELEASE_TAG" "$LOCAL_FILE" $EXTRA_FLAG --repo "$GITHUB_REPOSITORY" --title "🔖 $REPO_SLUG - $TAG ($NOW_DATE)" --notes-file "$NOTES_FILE" 2>/dev/null; then
                  FIRST_ASSET_CREATED=true
                else
                  error_occurred=1
                fi
              else
                safe_upload "$LOCAL_FILE" "$PER_RELEASE_TAG" || error_occurred=1
              fi
              rm -f "$LOCAL_FILE"
            done
            
            if [[ "$FIRST_ASSET_CREATED" == "false" ]]; then
               gh release create "$PER_RELEASE_TAG" $EXTRA_FLAG --repo "$GITHUB_REPOSITORY" --title "🔖 $REPO_SLUG - $TAG ($NOW_DATE) (empty)" --notes-file "$NOTES_FILE" 2>/dev/null || true
            fi
            rm -f "$NOTES_FILE"
            
            if [[ $error_occurred -ne 0 ]]; then exit 1; fi
          fi