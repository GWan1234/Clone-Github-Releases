name: Clone Backup Repositories E

on:
  schedule:
    - cron: "0 0 * * 2,4,6"
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.MY_TOKEN }}

      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y jq yq gh git curl p7zip-full coreutils bc

      - name: Run backup
        env:
          GITHUB_TOKEN: ${{ secrets.MY_TOKEN }}
        run: |
          set -euo pipefail
          export GIT_TERMINAL_PROMPT=0
          shopt -s nullglob globstar

          NOW_DATE=$(date +"%Y%m%d")
          NOW_TIME=$(date +"%H%M")
          NOW_HUMAN=$(date +"%Y-%m-%d %H:%M")
          TRACKING_FILE="commit-tracking-e-${NOW_DATE}.yaml"
          LAST_TRACKING_FILE=$(ls -1 commit-tracking-e-*.yaml 2>/dev/null | sort -r | head -n1 || true)

          if [[ ! -f "$TRACKING_FILE" && -n "$LAST_TRACKING_FILE" && -f "$LAST_TRACKING_FILE" ]]; then
            echo "📋 Copying latest tracking file to today: $LAST_TRACKING_FILE -> $TRACKING_FILE"
            cp "$LAST_TRACKING_FILE" "$TRACKING_FILE"
          fi

          safe() {
            local v="${1:-unknown}"
            if [[ -z "$v" || "$v" == "null" || "$v" == "-" || "$v" == "none" ]]; then
              echo "unknown"
            else
              echo "$v"
            fi
          }

          sanitize() {
            echo "$1" \
              | tr '/' '-' \
              | tr '[:upper:]' '[:lower:]' \
              | sed 's/[^a-z0-9._-]/-/g' \
              | sed 's/-\+/-/g' \
              | sed 's/^-//;s/-$//'
          }

          cleanup() {
            rm -rf tmp *.7z* *.sha256 up-* core.* .gitignore .DS_Store 2>/dev/null || true

          }

          auth_url() {
            echo "https://x-access-token:${GITHUB_TOKEN}@github.com/$1.git"
          }

          fetch_repo_info() {
            curl -fsSL --retry 2 --max-time 15 \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              "https://api.github.com/repos/$1" \
              2>/dev/null || echo '{}'
          }

          fetch_latest_release() {
            curl -fsSL --retry 2 --max-time 15 \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              "https://api.github.com/repos/$1/releases/latest" \
              2>/dev/null || echo '{}'
          }

          fetch_all_releases() {
              local repo="$1"
              local page=1
              local tmpfile=$(mktemp)
              echo '[]' > "$tmpfile"

              while true; do
                  data=$(curl -fsSL \
                      -H "Authorization: Bearer ${GITHUB_TOKEN}" \
                      "https://api.github.com/repos/${repo}/releases?per_page=100&page=${page}" \
                      2>/dev/null || echo "[]")

                  local count
                  count=$(echo "$data" | jq 'length')
                  [[ "$count" == "0" ]] && break

                  jq -s '.[0] + .[1]' "$tmpfile" <(echo "$data") > "${tmpfile}.new"
                  mv "${tmpfile}.new" "$tmpfile"

                  page=$((page + 1))
              done

              cat "$tmpfile"
              rm -f "$tmpfile"
          }

          release_exists() {
            gh release view "$1" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1
          }

          human_size() {
            numfmt --to=iec --suffix=B "$1" 2>/dev/null || echo "0B"
          }

          safe_upload() {
            local file="$1"
            local tag="$2"
            if [[ -f "$file" && -s "$file" ]]; then
              echo "Uploading: $file"
              if ! gh release upload "$tag" "$file" --repo "$GITHUB_REPOSITORY" --clobber 2>/dev/null; then
                echo "❌ UPLOAD FAILED: $file"
                return 1
              fi
            fi
            return 0
          }

          set_tracking() {
            local repo="$1"
            local state="$2"
            yq -y -i --arg repo "$repo" --arg state "$state" '.[$repo] = $state' "$TRACKING_FILE" 2>/dev/null || true
          }

          sync_tracking() {
            echo -e "\n💾 Syncing tracking file to GitHub..."
            git config --global user.name "Action"
            git config --global user.email "action@github.com"
            local branch="${GITHUB_REF_NAME:-main}"
            git checkout "$branch" 2>/dev/null || git checkout main 2>/dev/null || true
            if ! git pull --rebase --autostash origin "$branch" 2>/dev/null; then
              echo "❌ Tracking pull/rebase failed"
              return 1
            fi
            git add "$TRACKING_FILE"
            git commit -m "track sync: $NOW_HUMAN" 2>/dev/null || true
            if ! git push origin HEAD; then
              echo "❌ Tracking push failed"
              return 1
            fi
            echo "✅ Tracking file synced"
            return 0
          }

          get_repo_current_state() {
            local repo="$1"
            local mirror="$2"
            local all_releases="$3"

            local branch_states=""
            local count=0

            while read -r line; do
              [[ $count -ge 10 ]] && break
              local name sha
              name="${line%%|*}"
              sha="${line#*|}"
              branch_states+="${name}:${sha};"
              count=$((count + 1))
            done < <(
              git -C "$mirror" for-each-ref \
                --sort=-committerdate \
                --format='%(refname:short)|%(objectname)' \
                refs/heads
            )

            declare -A tag_commit_map
            while read -r sha ref; do
                ref=${ref#refs/tags/}
                tag_commit_map["$ref"]="$sha"
            done < <(git -C "$mirror" for-each-ref --format='%(objectname) %(refname)' refs/tags)

            local release_states=""
            while read -r release; do
                local tag_name
                tag_name=$(echo "$release" | jq -r '.tag_name // empty')
                [[ -z "$tag_name" ]] && continue
                local commit="${tag_commit_map[$tag_name]:-unknown}"
                local max_updated="none"
                local assets_updated
                assets_updated=$(echo "$release" | jq -r '[.assets[]?.updated_at] | max // "none"')
                if [[ "$assets_updated" != "null" && "$assets_updated" != "none" ]]; then
                    max_updated="$assets_updated"
                fi
                release_states+="${tag_name}:${commit}:${max_updated};"
            done < <(echo "$all_releases" | jq -c 'sort_by(.tag_name)[]' 2>/dev/null || true)

            echo "BRANCHES:[${branch_states}]|RELEASES:[${release_states}]"
          }

          need_backup() {
            local repo="$1"
            local current_state="$2"
            if [[ -z "$LAST_TRACKING_FILE" || ! -f "$LAST_TRACKING_FILE" ]]; then
              return 0
            fi
            local last_state
            last_state=$(yq -r --arg repo "$repo" '.[$repo] // ""' "$LAST_TRACKING_FILE" 2>/dev/null || true)
            if [[ "$last_state" != "$current_state" ]]; then
              return 0
            fi
            return 1
          }

          build_branch_notes() {
            REPO="$1"
            REPO_JSON="$2"
            BRANCH_COUNT="$3"
            ARCHIVE_SIZE="$4"
            RELEASE_TIME="$5"
            UPSTREAM_JSON="$6"

            REPO_URL=$(safe "$(echo "$REPO_JSON" | jq -r '.html_url // "unknown"')")
            DESC=$(safe "$(echo "$REPO_JSON" | jq -r '.description // "none"')")
            DEF_BRANCH=$(safe "$(echo "$REPO_JSON" | jq -r '.default_branch // "unknown"')")
            LANG=$(safe "$(echo "$REPO_JSON" | jq -r '.language // "unknown"')")
            STARS=$(safe "$(echo "$REPO_JSON" | jq -r '.stargazers_count // 0')")
            FORKS=$(safe "$(echo "$REPO_JSON" | jq -r '.forks_count // 0')")

            CREATED=$(safe "$(echo "$REPO_JSON" | jq -r '.created_at // "unknown"')")
            UPDATED=$(safe "$(echo "$REPO_JSON" | jq -r '.updated_at // "unknown"')")
            PUSHED=$(safe "$(echo "$REPO_JSON" | jq -r '.pushed_at // "unknown"')")

            UP_TAG=$(safe "$(echo "$UPSTREAM_JSON" | jq -r '.tag_name // "none"')")
            UP_NAME=$(safe "$(echo "$UPSTREAM_JSON" | jq -r '.name // "none"')")
            UP_TIME=$(safe "$(echo "$UPSTREAM_JSON" | jq -r '.published_at // "none"')")

            printf -- "## 📦 Branch Backup\n"
            printf -- "- URL: %s\n" "$REPO_URL"
            printf -- "- Description: %s\n" "$DESC"
            printf -- "- Default branch: %s\n" "$DEF_BRANCH"
            printf -- "- Language: %s\n" "$LANG"
            printf -- "- Stars: %s | Forks: %s\n" "$STARS" "$FORKS"
            printf -- "\n## 🕒 Source Timeline\n"
            printf -- "- Created: %s\n" "$CREATED"
            printf -- "- Updated: %s\n" "$UPDATED"
            printf -- "- Pushed: %s\n" "$PUSHED"
            printf -- "\n## 🏷 Latest Release\n"
            printf -- "- Tag: %s\n" "$UP_TAG"
            printf -- "- Name: %s\n" "$UP_NAME"
            printf -- "- Published: %s\n" "$UP_TIME"
            printf -- "\n## 📊 Backup Info\n"
            printf -- "- Branches backed up: %s\n" "$BRANCH_COUNT"
            printf -- "- Archive size: %s\n" "$(human_size "$ARCHIVE_SIZE")"
            printf -- "- Backup time: %s\n" "$RELEASE_TIME"
          }

          build_release_notes() {
            RELEASE_JSON="$1"
            TAG_NAME=$(safe "$(echo "$RELEASE_JSON" | jq -r '.tag_name // "unknown"')")
            NAME=$(safe "$(echo "$RELEASE_JSON" | jq -r '.name // "none"')")
            PUBLISHED=$(safe "$(echo "$RELEASE_JSON" | jq -r '.published_at // "unknown"')")
            BODY=$(echo "$RELEASE_JSON" | jq -r '.body // "No description."' | head -c 4000)
            ASSETS_COUNT=$(echo "$RELEASE_JSON" | jq '.assets | length // 0')

            printf -- "## 🏷 Upstream Release\n"
            printf -- "- Tag: %s\n" "$TAG_NAME"
            printf -- "- Name: %s\n" "$NAME"
            printf -- "- Published: %s\n" "$PUBLISHED"
            printf -- "- Assets: %s\n" "$ASSETS_COUNT"
            printf -- "\n## 📝 Original Body\n%s\n" "$BODY"
            printf -- "\n## ⏱ Backup Time\n%s\n" "$NOW_HUMAN"
          }

          get_all_repos() {
            local owner="$1"
            local user_info
            user_info=$(curl -sSL -H "Authorization: Bearer ${GITHUB_TOKEN}" "https://api.github.com/users/$owner")
            local type
            type=$(echo "$user_info" | jq -r '.type // empty')
            if [[ -z "$type" ]]; then
              echo "❌ Error: Could not resolve owner type for $owner." >&2
              return 0
            fi
            local api_endpoint
            if [[ "$type" == "Organization" ]]; then
              api_endpoint="orgs/$owner/repos"
            else
              api_endpoint="users/$owner/repos"
            fi
            local page=1 max_pages=20
            while [[ $page -le $max_pages ]]; do
              local data
              data=$(curl -sSL -H "Authorization: Bearer ${GITHUB_TOKEN}" "https://api.github.com/${api_endpoint}?per_page=100&page=$page")
              local is_array
              is_array=$(echo "$data" | jq 'if type=="array" then true else false end')
              if [[ "$is_array" != "true" ]]; then
                echo "❌ API Error fetching repos for $owner (Page $page)" >&2
                break
              fi
              local count
              count=$(echo "$data" | jq 'length')
              [[ "$count" == "0" ]] && break
              echo "$data" | jq -r '.[] | select(.private==false) | .full_name'
              page=$((page + 1))
            done
          }

          backup_repo() {
            local REPO="$1"
            echo -e "\n====================================="
            echo "==== BACKUP: $REPO ===="
            echo "====================================="

            cleanup
            mkdir -p tmp
            local error_occurred=0

            local REPO_SLUG
            REPO_SLUG=$(sanitize "$REPO")

            local REPO_JSON UPSTREAM_JSON ALL_RELEASES
            REPO_JSON=$(fetch_repo_info "$REPO")
            UPSTREAM_JSON=$(fetch_latest_release "$REPO")
            ALL_RELEASES=$(fetch_all_releases "$REPO")

            local MIRROR EXPORT
            MIRROR="tmp/${REPO_SLUG}.git"
            EXPORT="tmp/export/${REPO_SLUG}"
            mkdir -p "$EXPORT"

            echo "🔽 Cloning repository..."
            git clone --mirror "$(auth_url "$REPO")" "$MIRROR" >/dev/null 2>&1 || {
              echo "❌ Clone failed, skip repo"
              cleanup
              return 0
            }

            local CURRENT_STATE
            CURRENT_STATE=$(get_repo_current_state "$REPO" "$MIRROR" "$ALL_RELEASES")

            if [[ -z "$LAST_TRACKING_FILE" || ! -f "$LAST_TRACKING_FILE" ]]; then
              echo "🔴 No tracking file yet → force backup"
            else
              if ! need_backup "$REPO" "$CURRENT_STATE"; then
                echo "✅ Skip: $REPO (no changes)"
                cleanup
                return 0
              fi
              echo "🔴 Changes detected → backup"
            fi

            # ----- 1. 分支打包（独立 Release）-----
            mapfile -t BRANCHES < <(
              git -C "$MIRROR" for-each-ref \
                --sort=-committerdate \
                --format='%(refname:short)' \
                refs/heads 2>/dev/null || true
            )
            BRANCHES=("${BRANCHES[@]:0:10}")

            local BRANCH_TAG="${REPO_SLUG}-branches-${NOW_DATE}-${NOW_TIME}"
            BRANCH_TAG=$(sanitize "$BRANCH_TAG")

            if [[ ${#BRANCHES[@]} -gt 0 ]]; then
              echo "📦 Packaging ${#BRANCHES[@]} branches..."
              FILES=()
              IDX=0
              for B in "${BRANCHES[@]}"; do
                B_SLUG=$(sanitize "$B")
                DIR="${EXPORT}/${B_SLUG}"
                mkdir -p "$DIR"
                git -C "$MIRROR" archive "$B" | tar -xf - -C "$DIR" 2>/dev/null || continue
                ARCHIVE="${REPO_SLUG}-${B_SLUG}-${IDX}.7z"
                7z a -t7z -mx5 -mmt2 -v1500m "$ARCHIVE" "$DIR" >/dev/null 2>&1 || true
                for f in "${ARCHIVE}"*; do
                  if [[ -f "$f" && -s "$f" && "$f" != *.sha256 ]]; then
                    sha256sum "$f" > "${f}.sha256" 2>/dev/null || true
                    FILES+=("$f" "${f}.sha256")
                  fi
                done
                IDX=$((IDX + 1))
              done

              if [[ ${#FILES[@]} -gt 0 ]]; then
                local TOTAL_SIZE=0
                for f in *.7z*; do
                  if [[ -f "$f" && "$f" != *.sha256 ]]; then
                    TOTAL_SIZE=$((TOTAL_SIZE + $(stat -c%s "$f" 2>/dev/null || echo 0)))
                  fi
                done

                echo "🚀 Creating branch backup release: $BRANCH_TAG"
                if release_exists "$BRANCH_TAG"; then
                  echo "⚠️ Deleting existing branch release $BRANCH_TAG"
                  gh release delete "$BRANCH_TAG" --repo "$GITHUB_REPOSITORY" --cleanup-tag -y 2>/dev/null || true
                fi

                NOTES_FILE=$(mktemp)
                build_branch_notes "$REPO" "$REPO_JSON" "${#BRANCHES[@]}" "$TOTAL_SIZE" "$NOW_HUMAN" "$UPSTREAM_JSON" > "$NOTES_FILE"

                FIRST_FILE="${FILES[0]}"
                if gh release create "$BRANCH_TAG" "$FIRST_FILE" \
                  --repo "$GITHUB_REPOSITORY" \
                  --title "📦 Branches of $REPO_SLUG ($NOW_HUMAN)" \
                  --notes-file "$NOTES_FILE" 2>/dev/null; then
                  echo "✅ Branch release created"
                  for ((i=1; i<${#FILES[@]}; i++)); do
                    safe_upload "${FILES[$i]}" "$BRANCH_TAG" || error_occurred=1
                  done
                else
                  echo "❌ Branch release creation failed"
                  error_occurred=1
                fi
                rm -f "$NOTES_FILE"
              else
                echo "ℹ️ No branch packages generated"
              fi
            else
              echo "ℹ️ No branches to package"
            fi

            # ----- 2. 每个上游 Release 独立备份（流水线：下载-上传 同时下载下一个）-----
            echo "🔗 Processing each upstream release separately..."
            local DISK_LIMIT_GB=5
            local MAX_UPLOAD_JOBS=2

            echo "$ALL_RELEASES" | jq -c '.[]' 2>/dev/null | while read -r release; do
                RELEASE_TAG=$(echo "$release" | jq -r '.tag_name // "unknown"')
                RELEASE_SLUG=$(sanitize "$RELEASE_TAG")
                PER_RELEASE_TAG="${REPO_SLUG}-${RELEASE_SLUG}"

                echo "-------- Release: $RELEASE_TAG → Backup tag: $PER_RELEASE_TAG --------"

                if release_exists "$PER_RELEASE_TAG"; then
                  echo "⚠️ Tag $PER_RELEASE_TAG exists, recreating..."
                  gh release delete "$PER_RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --cleanup-tag -y 2>/dev/null || true
                fi

                NOTES_FILE=$(mktemp)
                build_release_notes "$release" > "$NOTES_FILE"

                ASSETS_DATA=$(echo "$release" | jq -c '.assets[]? | select(.name != null and .browser_download_url != null)' 2>/dev/null || true)

                local FIRST_ASSET_CREATED=false
                local UPLOAD_PIDS=()
                local UPLOAD_FILES=()

                if [[ -n "$ASSETS_DATA" ]]; then
                  while read -r asset; do
                    [[ -z "$asset" ]] && continue

                    # 磁盘空间检查
                    AVAIL_GB=$(df -BG . | tail -1 | awk '{print $4}' | sed 's/G//')
                    if [[ $AVAIL_GB -lt $DISK_LIMIT_GB ]]; then
                      echo "⚠️ Low disk space (${AVAIL_GB}G < ${DISK_LIMIT_GB}G), stopping downloads for safety"
                      break
                    fi

                    ASSET_NAME=$(echo "$asset" | jq -r '.name')
                    ASSET_URL=$(echo "$asset" | jq -r '.browser_download_url')
                    ASSET_SIZE=$(echo "$asset" | jq -r '.size // 0')
                    LOCAL_FILE="up-${ASSET_NAME}"

                    echo "⬇ Downloading: $ASSET_NAME ($(human_size "$ASSET_SIZE"))"
                    if ! curl -LSs --connect-timeout 30 --retry 3 --retry-delay 15 -o "$LOCAL_FILE" "$ASSET_URL"; then
                      echo "❌ Download failed for $ASSET_NAME"
                      error_occurred=1
                      continue
                    fi

                    if [[ "$FIRST_ASSET_CREATED" == "false" ]]; then
                      echo "🚀 Creating release $PER_RELEASE_TAG with first asset"
                      if gh release create "$PER_RELEASE_TAG" "$LOCAL_FILE" \
                        --repo "$GITHUB_REPOSITORY" \
                        --title "🔖 $REPO_SLUG - $RELEASE_TAG" \
                        --notes-file "$NOTES_FILE" 2>/dev/null; then
                        echo "✅ Release $PER_RELEASE_TAG created"
                        FIRST_ASSET_CREATED=true
                        rm -f "$LOCAL_FILE"
                      else
                        echo "❌ Failed to create release $PER_RELEASE_TAG"
                        error_occurred=1
                        rm -f "$LOCAL_FILE"
                        break
                      fi
                    else
                      # 控制并发上传：如果上传队列已满，等待最早的任务完成（自动删除）
                      while [[ ${#UPLOAD_PIDS[@]} -ge $MAX_UPLOAD_JOBS ]]; do
                        wait "${UPLOAD_PIDS[0]}" 2>/dev/null || true
                        rm -f "${UPLOAD_FILES[0]}"
                        UPLOAD_PIDS=("${UPLOAD_PIDS[@]:1}")
                        UPLOAD_FILES=("${UPLOAD_FILES[@]:1}")
                      done

                      # 后台上传当前文件，上传完成后自动删除
                      (
                        if safe_upload "$LOCAL_FILE" "$PER_RELEASE_TAG"; then
                          echo "✅ Uploaded $ASSET_NAME"
                        else
                          echo "❌ Upload failed for $ASSET_NAME"
                          echo "UPLOAD_FAILED:${PER_RELEASE_TAG}/${ASSET_NAME}" >> /tmp/upload_failed
                        fi
                        rm -f "$LOCAL_FILE"
                      ) &
                      UPLOAD_PIDS+=($!)
                      UPLOAD_FILES+=("$LOCAL_FILE")
                    fi
                  done <<< "$ASSETS_DATA"

                  # 等待剩余上传全部完成
                  for pid in "${UPLOAD_PIDS[@]}"; do
                    wait "$pid" 2>/dev/null || true
                  done
                  for f in "${UPLOAD_FILES[@]}"; do
                    rm -f "$f"
                  done

                  if [[ -f /tmp/upload_failed ]]; then
                    error_occurred=1
                    echo "⚠️ Some uploads failed for $PER_RELEASE_TAG"
                    cat /tmp/upload_failed
                    rm -f /tmp/upload_failed
                  fi

                  if [[ "$FIRST_ASSET_CREATED" == "false" ]]; then
                    echo "⚠️ No asset was successfully downloaded, creating empty release"
                    gh release create "$PER_RELEASE_TAG" \
                      --repo "$GITHUB_REPOSITORY" \
                      --title "🔖 $REPO_SLUG - $RELEASE_TAG (empty)" \
                      --notes-file "$NOTES_FILE" 2>/dev/null || true
                  fi
                else
                  echo "ℹ️ No assets for $RELEASE_TAG, creating empty release"
                  gh release create "$PER_RELEASE_TAG" \
                    --repo "$GITHUB_REPOSITORY" \
                    --title "🔖 $REPO_SLUG - $RELEASE_TAG (no assets)" \
                    --notes-file "$NOTES_FILE" 2>/dev/null || true
                fi

                rm -f "$NOTES_FILE"
            done

            if [[ $error_occurred -eq 0 ]]; then
              echo "✅ Backup 100% SUCCESS → writing tracking"
              set_tracking "$REPO" "$CURRENT_STATE"
              if ! sync_tracking; then
                echo "❌ WARNING: Tracking sync failed"
                error_occurred=1
              fi
            else
              echo "❌ Backup FAILED → NO tracking write"
            fi

            cleanup
            [[ $error_occurred -eq 0 ]] && echo "✅ Backup success: $REPO" || echo "⚠️ Backup finished with warnings"
          }

          process_all() {
              local excluded_repos=()
              mapfile -t excluded_repos < <(
                  yq -r '.exclude[]?' repositoriese.yaml 2>/dev/null |
                  grep -v '^[[:space:]]*#' |
                  sed '/^[[:space:]]*$/d' || true
              )
          
              is_excluded() {
                  local repo="$1"
                  for ex in "${excluded_repos[@]}"; do
                      if [[ "$repo" == "$ex" ]]; then
                          return 0
                      fi
                  done
                  return 1
              }
          
              mapfile -t OWNERS < <(
                  yq -r '.allrepositories[]?' repositoriese.yaml 2>/dev/null \
                  | grep -v '^[[:space:]]*#' \
                  | sed '/^[[:space:]]*$/d' || true
              )
          
              for O in "${OWNERS[@]}"; do
                  [[ -z "$O" ]] && continue
                  echo -e "\n==== Scanning owner: $O ===="
                  mapfile -t REPOS < <(get_all_repos "$O" | grep -v '^$' || true)
                  [[ ${#REPOS[@]} -eq 0 ]] && { echo "ℹ️ No public repos found"; continue; }
                  for R in "${REPOS[@]}"; do
                      if is_excluded "$R"; then
                          echo "⛔ Excluded: $R"
                          continue
                      fi
                      backup_repo "$R"
                  done
              done
          
              echo -e "\n==== Processing manual repositories ===="
              mapfile -t ALL_KEYS < <(
                  yq -r '.repositories | keys[]' repositoriese.yaml 2>/dev/null \
                  | grep -v '^[[:space:]]*#' \
                  | sed '/^[[:space:]]*$/d' || true
              )
              for KEY in "${ALL_KEYS[@]}"; do
                  echo "➡️ Group: $KEY"
                  mapfile -t REPOS < <(
                      yq -r --arg key "$KEY" '.repositories[$key] // [] | .[]' repositoriese.yaml 2>/dev/null \
                      | grep -v '^[[:space:]]*#' \
                      | sed '/^[[:space:]]*$/d' || true
                  )
                  for R in "${REPOS[@]}"; do
                      [[ -z "$R" ]] && continue
                      if is_excluded "$R"; then
                          echo "⛔ Excluded: $R"
                          continue
                      fi
                      backup_repo "$R"
                  done
              done
          }

          process_all
          echo -e "\n🎉 All done"