name: Clone Backup Repositories

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq yq gh git curl tar coreutils

      - name: Run backup
        env:
          GITHUB_TOKEN: ${{ secrets.MY_TOKEN }}
        run: |
          set -euo pipefail
          export GIT_TERMINAL_PROMPT=0

          # =========================
          # 时间戳（新增）
          # =========================
          NOW_DATE=$(date +"%Y%m%d")
          NOW_TIME=$(date +"%H%M")
          NOW_HUMAN=$(date +"%Y-%m-%d %H:%M")

          # =========================
          # cleanup
          # =========================
          cleanup() {
            rm -rf tmp *.tar.gz *.part-* *.sha256 2>/dev/null || true
          }

          # =========================
          # auth
          # =========================
          auth_url() {
            echo "https://x-access-token:${GITHUB_TOKEN}@github.com/$1.git"
          }

          # =========================
          # release API
          # =========================
          fetch_release() {
            curl -fsSL \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              "https://api.github.com/repos/$1/releases/latest" \
              2>/dev/null || echo '{}'
          }

          # =========================
          # git info
          # =========================
          last_commit() {
            git -C "$1" log -1 --format=%cd --date=short 2>/dev/null || echo "unknown"
          }

          release_exists() {
            gh release view "$1" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1
          }

          # =========================
          # fetch owner repos（过滤不可用项目）
          # =========================
          fetch_owner_repos() {
            local OWNER="$1"
            local PAGE=1

            while :; do
              BODY=$(curl -fsSL \
                -H "Authorization: Bearer ${GITHUB_TOKEN}" \
                "https://api.github.com/users/$OWNER/repos?per_page=100&page=$PAGE" \
                2>/dev/null || true)

              COUNT=$(echo "$BODY" | jq 'length' 2>/dev/null || echo 0)
              [ "$COUNT" -eq 0 ] && break

              echo "$BODY" | jq -r '
                .[]
                | select(.private == false)
                | select(.archived == false)
                | select(.disabled == false)
                | .full_name
              '

              PAGE=$((PAGE+1))
            done
          }

          # =========================
          # 核心备份
          # =========================
          backup_repo() {
            local TAG="$1"
            local TITLE="$2"
            local REPO="$3"

            echo "==== Processing $REPO ===="

            # 预检查（避免 403 / 禁用）
            if ! git ls-remote "$(auth_url "$REPO")" >/dev/null 2>&1; then
              echo "⛔ Skip inaccessible repo: $REPO"
              return 0
            fi

            # =========================
            # ⭐ 时间戳 TAG（核心）
            # =========================
            local TAG_TS="${TAG}-${NOW_DATE}-${NOW_TIME}"

            if release_exists "$TAG_TS"; then
              echo "Skip existing: $TAG_TS"
              return 0
            fi

            cleanup
            mkdir -p tmp/src tmp/assets

            NAME="${REPO#*/}"

            # clone（容错）
            if ! git clone --depth=1 "$(auth_url "$REPO")" "tmp/src/$NAME"; then
              echo "⛔ Clone failed: $REPO"
              return 0
            fi

            SRC_DATE=$(last_commit "tmp/src/$NAME")

            REL_JSON=$(fetch_release "$REPO")
            REL_DATE=$(echo "$REL_JSON" | jq -r '.published_at // "none"' | cut -d'T' -f1)

            mapfile -t URLS < <(echo "$REL_JSON" | jq -r '.assets[]?.browser_download_url // empty')

            for URL in "${URLS[@]}"; do
              FILE_NAME=$(basename "${URL%%\?*}")
              curl -fL \
                -H "Authorization: Bearer ${GITHUB_TOKEN}" \
                -o "tmp/assets/$FILE_NAME" "$URL" || true
            done

            TAR="${NAME}.tar.gz"

            tar -czf "$TAR" -C tmp .
            sha256sum "$TAR" > "$TAR.sha256"

            split -b 1800m \
              --numeric-suffixes=1 \
              --suffix-length=2 \
              "$TAR" \
              "$TAR.part-"

            PARTS=( ${TAR}.part-* )
            [ "${#PARTS[@]}" -eq 0 ] && { cleanup; return 0; }

            # =========================
            # release title（带时间）
            # =========================
            RELEASE_TITLE="${TITLE} (${NOW_HUMAN})"

            NOTES=$(printf "Repository: https://github.com/%s\nSource Updated: %s\nLatest Release Date: %s\nBackup Time: %s\n" \
              "$REPO" "$SRC_DATE" "$REL_DATE" "$NOW_HUMAN")

            gh release create "$TAG_TS" \
              "${PARTS[@]}" "$TAR.sha256" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$RELEASE_TITLE" \
              --notes "$NOTES"

            cleanup
          }

          # =========================
          # allrepositories
          # =========================
          process_allrepositories() {
            echo "===== allrepositories ====="

            mapfile -t OWNERS < <(yq -r '.allrepositories[]' repositories.yaml 2>/dev/null || true)

            for OWNER in "${OWNERS[@]}"; do
              [ -z "$OWNER" ] && continue

              echo "OWNER: $OWNER"

              mapfile -t LIST < <(fetch_owner_repos "$OWNER")

              for REPO in "${LIST[@]}"; do
                NAME="${REPO#*/}"

                TAG="${OWNER}-${NAME}"
                TITLE="$NAME"

                backup_repo "$TAG" "$TITLE" "$REPO"
              done
            done
          }

          # =========================
          # repositories
          # =========================
          process_repositories() {
            echo "===== repositories ====="

            mapfile -t REPOS < <(yq -r '.repositories.repo0[]' repositories.yaml 2>/dev/null || true)

            for REPO in "${REPOS[@]}"; do
              NAME="${REPO#*/}"

              TAG="$NAME"
              TITLE="$NAME"

              backup_repo "$TAG" "$TITLE" "$REPO"
            done
          }

          # =========================
          # run
          # =========================
          process_allrepositories
          process_repositories
