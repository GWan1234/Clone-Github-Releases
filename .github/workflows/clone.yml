name: Clone Backup Repositories

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      ssh:
        description: 'SSH Connection To Actions?'
        required: true
        default: 'false'

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout self repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq yq gh wget curl git tar coreutils

      - name: Backup repositories
        env:
          GITHUB_TOKEN: ${{ secrets.MY_TOKEN }}
        run: |
          set -euo pipefail
          export GIT_TERMINAL_PROMPT=0

          declare -A SEEN_REPOS=()

          BATCH_SIZE=10   # ⭐ 每批 repo 数量（可调）

          cleanup() {
            rm -rf tmp *.tar.gz *.part-* *.sha256 2>/dev/null || true
          }

          auth_clone_url() {
            local repo="$1"
            echo "https://x-access-token:${GITHUB_TOKEN}@github.com/${repo}.git"
          }

          fetch_latest_release_json() {
            local repo="$1"
            curl -fsSL \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${repo}/releases/latest" \
              2>/dev/null || true
          }

          # =========================
          # 单仓库（repositories）
          # =========================
          process_single_repo() {
            local OWNER="$1"
            local NAME="$2"
            local REPO="$3"

            if [ "${SEEN_REPOS[$REPO]+x}" ]; then
              echo "Skip duplicate repo: ${REPO}"
              return 0
            fi
            SEEN_REPOS["$REPO"]=1

            cleanup
            echo "==== Processing ${OWNER}/${NAME} ===="

            RELEASE_JSON="$(fetch_latest_release_json "$REPO")"

            UPSTREAM_TAG="no-release"
            UPSTREAM_DATE="00000000"

            if [ -n "$RELEASE_JSON" ] && echo "$RELEASE_JSON" | jq -e '.tag_name? // empty' >/dev/null 2>&1; then
              UPSTREAM_TAG="$(echo "$RELEASE_JSON" | jq -r '.tag_name')"
              UPSTREAM_DATE="$(echo "$RELEASE_JSON" | jq -r '.published_at' | cut -d'T' -f1 | tr -d '-')"
            else
              RELEASE_JSON='{"assets":[]}'
            fi

            BACKUP_DATE="$(date +%Y%m%d)"
            TAG="backup-${OWNER}-${NAME}-${UPSTREAM_TAG}-${UPSTREAM_DATE}-${BACKUP_DATE}"

            if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
              echo "Skip existing ${TAG}"
              return 0
            fi

            mkdir -p tmp/src tmp/assets

            git clone --depth=1 "$(auth_clone_url "$REPO")" "tmp/src/${NAME}" || return 0

            mapfile -t URLS < <(echo "$RELEASE_JSON" | jq -r '.assets[]?.browser_download_url // empty')

            for URL in "${URLS[@]}"; do
              FILE_NAME="$(basename "${URL%%\?*}")"
              curl -fL -H "Authorization: Bearer ${GITHUB_TOKEN}" \
                -o "tmp/assets/${FILE_NAME}" "$URL" || true
            done

            TAR="${OWNER}-${NAME}-${UPSTREAM_TAG}.tar.gz"

            tar -czf "$TAR" -C tmp .
            sha256sum "$TAR" > "${TAR}.sha256"

            split -b 1800m --numeric-suffixes=1 --suffix-length=2 "$TAR" "${TAR}.part-"

            PARTS=( ${TAR}.part-* )
            [ "${#PARTS[@]}" -eq 0 ] && { cleanup; return 0; }

            gh release create "$TAG" \
              "${PARTS[@]}" \
              "${TAR}.sha256" \
              --repo "$GITHUB_REPOSITORY" \
              --title "${OWNER}/${NAME}" \
              --notes "Auto backup ${REPO}"

            cleanup
          }

          # =========================
          # group
          # =========================
          process_group() {
            local ID="$1"

            if ! yq ".repositories.repo${ID}" repositories.yaml >/dev/null 2>&1; then
              return
            fi

            mapfile -t NAMES < <(yq -r ".repositories.name${ID}[]" repositories.yaml)
            mapfile -t REPOS < <(yq -r ".repositories.repo${ID}[]" repositories.yaml)

            for ((i=0;i<${#REPOS[@]};i++)); do
              process_single_repo "$ID" "${NAMES[$i]}" "${REPOS[$i]}"
            done
          }

          # =========================
          # 获取 owner 仓库
          # =========================
          fetch_owner_repos() {
            local OWNER="$1"
            local PAGE=1

            while :; do
              BODY="$(curl -fsSL \
                -H "Authorization: Bearer ${GITHUB_TOKEN}" \
                "https://api.github.com/users/${OWNER}/repos?per_page=100&page=${PAGE}" \
                2>/dev/null || true)"

              COUNT="$(echo "$BODY" | jq 'length' 2>/dev/null || echo 0)"
              [ "$COUNT" -eq 0 ] && break

              echo "$BODY" | jq -r '.[].full_name'

              PAGE=$((PAGE+1))
            done
          }

          # =========================
          # allrepositories（分包版）
          # =========================
          process_allrepositories() {
            echo "===== allrepositories (batched) ====="

            mapfile -t USERS < <(yq -r '.allrepositories[]' repositories.yaml)

            for OWNER in "${USERS[@]}"; do
              [ -z "$OWNER" ] && continue

              echo "==== OWNER: $OWNER ===="

              mapfile -t LIST < <(fetch_owner_repos "$OWNER")

              TOTAL=${#LIST[@]}
              [ "$TOTAL" -eq 0 ] && continue

              PART=1

              for ((i=0;i<TOTAL;i+=BATCH_SIZE)); do
                cleanup
                mkdir -p tmp

                SLICE=( "${LIST[@]:i:BATCH_SIZE}" )

                echo "Batch $PART (${#SLICE[@]} repos)"

                for REPO in "${SLICE[@]}"; do
                  NAME="${REPO#*/}"

                  git clone --depth=1 "$(auth_clone_url "$REPO")" "tmp/${NAME}" || continue

                  RELEASE_JSON="$(fetch_latest_release_json "$REPO")"

                  mapfile -t URLS < <(echo "$RELEASE_JSON" | jq -r '.assets[]?.browser_download_url // empty')

                  mkdir -p "tmp/${NAME}_assets"

                  for URL in "${URLS[@]}"; do
                    FILE_NAME="$(basename "${URL%%\?*}")"
                    curl -fL -H "Authorization: Bearer ${GITHUB_TOKEN}" \
                      -o "tmp/${NAME}_assets/${FILE_NAME}" "$URL" || true
                  done
                done

                DATE="$(date +%Y%m%d)"
                PART_ID=$(printf "%02d" "$PART")

                TAR="${OWNER}-part${PART_ID}-${DATE}.tar.gz"

                tar -czf "$TAR" -C tmp .
                sha256sum "$TAR" > "${TAR}.sha256"

                split -b 1800m --numeric-suffixes=1 --suffix-length=2 "$TAR" "${TAR}.part-"

                PARTS=( ${TAR}.part-* )
                [ "${#PARTS[@]}" -eq 0 ] && { cleanup; continue; }

                TAG="backup-${OWNER}-part${PART_ID}-${DATE}"

                if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
                  echo "Skip ${TAG}"
                  cleanup
                  PART=$((PART+1))
                  continue
                fi

                gh release create "$TAG" \
                  "${PARTS[@]}" \
                  "${TAR}.sha256" \
                  --repo "$GITHUB_REPOSITORY" \
                  --title "${OWNER} batch ${PART_ID}" \
                  --notes "Auto backup ${OWNER} batch ${PART_ID}"

                cleanup
                PART=$((PART+1))
              done
            done
          }

          # =========================
          # 执行
          # =========================
          process_allrepositories
          process_group 0
          process_group 1
          process_group 2

      - name: Setup Debug Session
        if: (github.event.inputs.ssh == 'true' && github.event.inputs.ssh != 'false')
        uses: mxschmitt/action-tmate@v3
