name: Clone Backup Repositories

on:
  schedule:
    - cron: "0 0 */3 * *"
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          # this might remove tools that are actually needed,
          # if set to "true" but frees about 6 GB
          tool-cache: true
          
          # all of these default to true, but feel free to set to
          # "false" if necessary for your workflow
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true
          
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq yq gh git curl p7zip-full coreutils

      - name: Run backup
        env:
          GITHUB_TOKEN: ${{ secrets.MY_TOKEN }}
        run: |
          set -euo pipefail
          export GIT_TERMINAL_PROMPT=0

          NOW_DATE=$(date +"%Y%m%d")
          NOW_TIME=$(date +"%H%M")
          NOW_HUMAN=$(date +"%Y-%m-%d %H:%M")

          cleanup() {
            rm -rf tmp *.7z* *.sha256 2>/dev/null || true
          }

          auth_url() {
            echo "https://x-access-token:${GITHUB_TOKEN}@github.com/$1.git"
          }

          # =========================
          # release API（防 404 / 空）
          # =========================
          fetch_release() {
            local REPO="$1"

            curl -fsSL \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              "https://api.github.com/repos/$REPO/releases/latest" \
              2>/dev/null || echo '{"assets":[]}'
          }

          # =========================
          # size（防 null）
          # =========================
          get_release_size() {
            echo "$1" | jq '[.assets // [] | .[].size] | add // 0'
          }

          # =========================
          # assets（防 null）
          # =========================
          fetch_assets() {
            echo "$1" | jq -r '.assets // [] | .[]? | .browser_download_url'
          }

          # =========================
          # batch assets（防越界）
          # =========================
          fetch_assets_batch() {
            local JSON="$1"
            local OFFSET="$2"
            local SIZE="$3"

            echo "$JSON" | jq -r \
              ".assets // [] | .[$OFFSET:$OFFSET+$SIZE][]? | .browser_download_url"
          }

          release_exists() {
            gh release view "$1" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1
          }

          backup_release() {
            local REPO="$1"

            echo "==== RELEASE BACKUP: $REPO ===="

            cleanup
            mkdir -p tmp/assets

            REL_JSON=$(fetch_release "$REPO")

            # 防 GitHub Not Found
            if echo "$REL_JSON" | jq -e '.message? == "Not Found"' >/dev/null 2>&1; then
              echo "⚠️ No release found, fallback empty"
              REL_JSON='{"assets":[]}'
            fi

            NAME="${REPO#*/}"

            TOTAL_SIZE=$(get_release_size "$REL_JSON")

            echo "Total size: ${TOTAL_SIZE} bytes"

            # =========================
            # 小于 8GB
            # =========================
            if [ "$TOTAL_SIZE" -lt 8589934592 ]; then

              mapfile -t URLS < <(fetch_assets "$REL_JSON")

              for URL in "${URLS[@]}"; do
                [ -z "$URL" ] && continue

                FILE="tmp/assets/$(basename "$URL")"

                curl -fL \
                  --retry 3 --retry-delay 2 \
                  -H "Authorization: Bearer ${GITHUB_TOKEN}" \
                  -o "$FILE" "$URL" || true
              done

              ARCHIVE="${NAME}.7z"

              7z a -t7z -mx=5 -mmt=2 "$ARCHIVE" tmp/assets >/dev/null || true

              sha256sum "$ARCHIVE" > "$ARCHIVE.sha256"

              gh release create "${NAME}-${NOW_DATE}-${NOW_TIME}" \
                "$ARCHIVE" "$ARCHIVE.sha256" \
                --repo "$GITHUB_REPOSITORY" \
                --title "$NAME ($NOW_HUMAN)" \
                --notes "safe backup mode"

              cleanup
              return 0
            fi

            # =========================
            # 大于 8GB（分批）
            # =========================
            echo "Batch mode enabled"

            TOTAL=$(echo "$REL_JSON" | jq '.assets // [] | length')

            BATCH=5
            OFFSET=0
            IDX=0

            while [ "$OFFSET" -lt "$TOTAL" ]; do

              echo "Batch $IDX ($OFFSET - $((OFFSET+BATCH)))"

              mapfile -t URLS < <(
                fetch_assets_batch "$REL_JSON" "$OFFSET" "$BATCH"
              )

              mkdir -p tmp/assets

              for URL in "${URLS[@]}"; do
                [ -z "$URL" ] && continue

                FILE="tmp/assets/$(basename "$URL")"

                curl -fL \
                  --retry 3 --retry-delay 2 \
                  -H "Authorization: Bearer ${GITHUB_TOKEN}" \
                  -o "$FILE" "$URL" || true
              done

              ARCHIVE="${NAME}-part-${IDX}.7z"

              7z a \
                -t7z \
                -mx=5 \
                -mmt=2 \
                "$ARCHIVE" \
                tmp/assets >/dev/null || true

              sha256sum "$ARCHIVE" > "$ARCHIVE.sha256"

              gh release create "${NAME}-${NOW_DATE}-${NOW_TIME}-p${IDX}" \
                "$ARCHIVE" "$ARCHIVE.sha256" \
                --repo "$GITHUB_REPOSITORY" \
                --title "$NAME part $IDX ($NOW_HUMAN)" \
                --notes "batch safe backup"

              rm -rf tmp/assets

              OFFSET=$((OFFSET + BATCH))
              IDX=$((IDX + 1))

              sleep 2
            done

            cleanup
          }

          # =========================
          # repo list
          # =========================
          process_repositories() {
            mapfile -t REPOS < <(yq -r '.repositories.repo0[]' repositories.yaml 2>/dev/null || true)

            for REPO in "${REPOS[@]}"; do
              backup_release "$REPO"
            done
          }

          process_allrepositories() {
            mapfile -t OWNERS < <(yq -r '.allrepositories[]' repositories.yaml 2>/dev/null || true)

            for OWNER in "${OWNERS[@]}"; do
              mapfile -t LIST < <(
                curl -fsSL \
                  -H "Authorization: Bearer ${GITHUB_TOKEN}" \
                  "https://api.github.com/users/$OWNER/repos?per_page=100" \
                | jq -r '.[] | select(.private==false) | .full_name'
              )

              for REPO in "${LIST[@]}"; do
                backup_release "$REPO"
              done
            done
          }

          process_allrepositories
          process_repositories
