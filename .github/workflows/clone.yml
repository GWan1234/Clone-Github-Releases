name: Clone Backup Repositories

on:
  schedule:
    - cron: "0 0 */3 * *"
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          # this might remove tools that are actually needed,
          # if set to "true" but frees about 6 GB
          tool-cache: true
          
          # all of these default to true, but feel free to set to
          # "false" if necessary for your workflow
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true
          
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y jq yq gh git curl p7zip-full coreutils

      - name: Run backup
        env:
          GITHUB_TOKEN: ${{ secrets.MY_TOKEN }}
        run: |
          set -euo pipefail
          export GIT_TERMINAL_PROMPT=0

          # =========================
          # 时间
          # =========================
          NOW_DATE=$(date +"%Y%m%d")
          NOW_TIME=$(date +"%H%M")
          NOW_HUMAN=$(date +"%Y-%m-%d %H:%M")

          # =========================
          # ⭐ 工业级 sanitize（核心）
          # =========================
          sanitize() {
            echo "$1" \
              | tr '/' '-' \
              | tr '[:upper:]' '[:lower:]' \
              | sed 's/[^a-z0-9._-]/-/g' \
              | sed 's/-\+/-/g' \
              | sed 's/^-//;s/-$//'
          }

          # =========================
          # cleanup
          # =========================
          cleanup() {
            rm -rf tmp *.7z* *.sha256 2>/dev/null || true
          }

          # =========================
          # auth
          # =========================
          auth_url() {
            echo "https://x-access-token:${GITHUB_TOKEN}@github.com/$1.git"
          }

          # =========================
          # release API（工业级 fallback）
          # =========================
          fetch_release() {
            local REPO="$1"

            curl -fsSL \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              "https://api.github.com/repos/$REPO/releases/latest" \
              2>/dev/null || echo '{"assets":[]}'
          }

          # =========================
          # size safe
          # =========================
          get_release_size() {
            echo "$1" | jq '[.assets // [] | .[].size] | add // 0'
          }

          # =========================
          # assets safe
          # =========================
          fetch_assets() {
            echo "$1" | jq -r '.assets // [] | .[]? | .browser_download_url'
          }

          fetch_assets_batch() {
            echo "$1" | jq -r \
              ".assets // [] | .[$2:$2+$3][]? | .browser_download_url"
          }

          # =========================
          # release exists safe
          # =========================
          release_exists() {
            gh release view "$1" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1
          }

          # =========================
          # clone safe
          # =========================
          safe_clone() {
            local REPO="$1"
            local DIR="$2"

            git clone \
              --depth=1 \
              --recurse-submodules \
              --shallow-submodules \
              "$(auth_url "$REPO")" \
              "$DIR" || return 1

            git -C "$DIR" submodule update --init --recursive || true
          }

          # =========================
          # core backup
          # =========================
          backup_release() {
            local REPO="$1"

            echo "==== BACKUP: $REPO ===="

            cleanup
            mkdir -p tmp/assets

            SAFE_REPO=$(sanitize "$REPO")
            NAME="${SAFE_REPO#*/}"

            REL_JSON=$(fetch_release "$REPO")

            # release not exist safe
            if echo "$REL_JSON" | jq -e '.message? == "Not Found"' >/dev/null 2>&1; then
              echo "⚠️ No release found"
              REL_JSON='{"assets":[]}'
            fi

            TOTAL_SIZE=$(get_release_size "$REL_JSON")
            echo "Total size: $TOTAL_SIZE"

            TAG="${NAME}-${NOW_DATE}-${NOW_TIME}"
            TAG=$(sanitize "$TAG")

            # =========================
            # skip existing release
            # =========================
            if release_exists "$TAG"; then
              echo "Skip existing: $TAG"
              return 0
            fi

            # =========================
            # clone safe
            # =========================
            DIR="tmp/src/$NAME"

            if ! safe_clone "$REPO" "$DIR"; then
              echo "❌ clone failed: $REPO"
              return 0
            fi

            # =========================
            # small repo mode
            # =========================
            if [ "$TOTAL_SIZE" -lt 8589934592 ]; then

              mapfile -t URLS < <(fetch_assets "$REL_JSON")

              for URL in "${URLS[@]}"; do
                [ -z "$URL" ] && continue

                curl -fL \
                  --retry 3 --retry-delay 2 \
                  -H "Authorization: Bearer ${GITHUB_TOKEN}" \
                  -o "tmp/assets/$(basename "$URL")" \
                  "$URL" || true
              done

              ARCHIVE="${NAME}.7z"

              7z a -t7z -mx=5 -mmt=2 "$ARCHIVE" tmp/assets >/dev/null || true

              sha256sum "$ARCHIVE" > "$ARCHIVE.sha256"

              gh release create "$TAG" \
                "$ARCHIVE" "$ARCHIVE.sha256" \
                --repo "$GITHUB_REPOSITORY" \
                --title "$NAME ($NOW_HUMAN)" \
                --notes "industrial stable backup"

              cleanup
              return 0
            fi

            # =========================
            # batch mode
            # =========================
            TOTAL=$(echo "$REL_JSON" | jq '.assets // [] | length')

            BATCH=5
            OFFSET=0
            IDX=0

            while [ "$OFFSET" -lt "$TOTAL" ]; do

              mapfile -t URLS < <(
                fetch_assets_batch "$REL_JSON" "$OFFSET" "$BATCH"
              )

              mkdir -p tmp/assets

              for URL in "${URLS[@]}"; do
                [ -z "$URL" ] && continue

                curl -fL \
                  --retry 3 --retry-delay 2 \
                  -H "Authorization: Bearer ${GITHUB_TOKEN}" \
                  -o "tmp/assets/$(basename "$URL")" \
                  "$URL" || true
              done

              ARCHIVE="${NAME}-part-${IDX}.7z"

              7z a -t7z -mx=5 -mmt=2 "$ARCHIVE" tmp/assets >/dev/null || true

              sha256sum "$ARCHIVE" > "$ARCHIVE.sha256"

              gh release create "${TAG}-p${IDX}" \
                "$ARCHIVE" "$ARCHIVE.sha256" \
                --repo "$GITHUB_REPOSITORY" \
                --title "$NAME part $IDX ($NOW_HUMAN)" \
                --notes "batch stable backup"

              rm -rf tmp/assets

              OFFSET=$((OFFSET + BATCH))
              IDX=$((IDX + 1))

              sleep 2
            done

            cleanup
          }

          # =========================
          # repo list
          # =========================
          process_repositories() {
            mapfile -t REPOS < <(yq -r '.repositories.repo0[]' repositories.yaml 2>/dev/null || true)

            for REPO in "${REPOS[@]}"; do
              backup_release "$REPO"
            done
          }

          process_allrepositories() {
            mapfile -t OWNERS < <(yq -r '.allrepositories[]' repositories.yaml 2>/dev/null || true)

            for OWNER in "${OWNERS[@]}"; do
              mapfile -t LIST < <(
                curl -fsSL \
                  -H "Authorization: Bearer ${GITHUB_TOKEN}" \
                  "https://api.github.com/users/$OWNER/repos?per_page=100" \
                | jq -r '.[] | select(.private==false) | .full_name'
              )

              for REPO in "${LIST[@]}"; do
                backup_release "$REPO"
              done
            done
          }

          process_allrepositories
          process_repositories
