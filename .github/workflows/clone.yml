name: Clone Backup Repositories

on:
  schedule:
    - cron: "0 0 */3 * *"
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq yq gh git curl p7zip-full

      - name: Run backup
        env:
          GITHUB_TOKEN: ${{ secrets.MY_TOKEN }}
        run: |
          set -euo pipefail
          export GIT_TERMINAL_PROMPT=0

          NOW_DATE=$(date +"%Y%m%d")
          NOW_TIME=$(date +"%H%M")
          NOW_HUMAN=$(date +"%Y-%m-%d %H:%M")

          cleanup() {
            rm -rf tmp *.7z* *.sha256 2>/dev/null || true
          }

          auth_url() {
            echo "https://x-access-token:${GITHUB_TOKEN}@github.com/$1.git"
          }

          release_exists() {
            gh release view "$1" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1
          }

          fetch_release() {
            curl -fsSL \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              "https://api.github.com/repos/$1/releases/latest" \
              2>/dev/null || echo '{}'
          }

          last_commit() {
            git -C "$1" log -1 --format=%cd --date=short 2>/dev/null || echo "unknown"
          }

          fetch_owner_repos() {
            local OWNER="$1"
            local PAGE=1

            while :; do
              BODY=$(curl -fsSL \
                -H "Authorization: Bearer ${GITHUB_TOKEN}" \
                "https://api.github.com/users/$OWNER/repos?per_page=100&page=$PAGE" \
                2>/dev/null || true)

              COUNT=$(echo "$BODY" | jq 'length' 2>/dev/null || echo 0)
              [ "$COUNT" -eq 0 ] && break

              echo "$BODY" | jq -r '
                .[]
                | select(.private == false)
                | select(.archived == false)
                | select(.disabled == false)
                | .full_name
              '

              PAGE=$((PAGE+1))
            done
          }

          backup_repo() {
            local TAG="$1"
            local TITLE="$2"
            local REPO="$3"

            echo "==== Processing $REPO ===="

            if ! git ls-remote "$(auth_url "$REPO")" >/dev/null 2>&1; then
              echo "⛔ Skip inaccessible repo: $REPO"
              return 0
            fi

            local TAG_TS="${TAG}-${NOW_DATE}-${NOW_TIME}"

            if release_exists "$TAG_TS"; then
              echo "Skip existing: $TAG_TS"
              return 0
            fi

            cleanup
            mkdir -p tmp/src tmp/assets

            NAME="${REPO#*/}"

            if ! git clone \
              --depth=1 \
              --recurse-submodules \
              --shallow-submodules \
              "$(auth_url "$REPO")" \
              "tmp/src/$NAME"; then
                echo "⛔ Clone failed: $REPO"
                return 0
            fi

            git -C "tmp/src/$NAME" submodule update \
              --init \
              --recursive \
              --force || true

            SRC_DATE=$(last_commit "tmp/src/$NAME")

            REL_JSON=$(fetch_release "$REPO")
            REL_DATE=$(echo "$REL_JSON" | jq -r '.published_at // "none"' | cut -d'T' -f1)

            mapfile -t URLS < <(echo "$REL_JSON" | jq -r '.assets[]?.browser_download_url // empty')

            for URL in "${URLS[@]}"; do
              FILE_NAME=$(basename "${URL%%\?*}")
              curl -fL \
                -H "Authorization: Bearer ${GITHUB_TOKEN}" \
                -o "tmp/assets/$FILE_NAME" "$URL" || true
            done

            # 修复 symlink
            find "tmp/src/$NAME" -xtype l -delete 2>/dev/null || true

            ARCHIVE="${NAME}.7z"

            set +e
            7z a -t7z -mx=9 -m0=lzma2 -snl -snh -v1800m "$ARCHIVE" tmp >/dev/null
            RC=$?
            set -e

            if [ "$RC" -gt 1 ]; then
              echo "❌ 7z fatal error: $RC"
              cleanup
              return 0
            fi

            PARTS=( ${NAME}.7z.* )

            if [ "${#PARTS[@]}" -eq 0 ]; then
              echo "❌ No archive generated"
              cleanup
              return 0
            fi

            sha256sum "${PARTS[0]}" > "${ARCHIVE}.sha256"

            RELEASE_TITLE="${TITLE} (${NOW_HUMAN})"

            NOTES=$(printf "Repository: https://github.com/%s\nSource Updated: %s\nLatest Release Date: %s\nBackup Time: %s\n" \
              "$REPO" "$SRC_DATE" "$REL_DATE" "$NOW_HUMAN")

            echo "🚀 Creating release..."

            if ! gh release create "$TAG_TS" \
              "${PARTS[@]}" "${ARCHIVE}.sha256" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$RELEASE_TITLE" \
              --notes "$NOTES"; then

              echo "❌ Upload failed, deleting release"
              gh release delete "$TAG_TS" --yes --repo "$GITHUB_REPOSITORY" || true
              cleanup
              return 0
            fi

            # ✅ 校验 assets 是否存在（关键）
            ASSET_COUNT=$(gh release view "$TAG_TS" \
              --repo "$GITHUB_REPOSITORY" \
              --json assets -q '.assets | length')

            if [ "$ASSET_COUNT" -eq 0 ]; then
              echo "❌ Empty release, deleting"
              gh release delete "$TAG_TS" --yes --repo "$GITHUB_REPOSITORY" || true
              cleanup
              return 0
            fi

            cleanup
          }

          process_allrepositories() {
            mapfile -t OWNERS < <(yq -r '.allrepositories[]' repositories.yaml 2>/dev/null || true)

            for OWNER in "${OWNERS[@]}"; do
              mapfile -t LIST < <(fetch_owner_repos "$OWNER")

              for REPO in "${LIST[@]}"; do
                NAME="${REPO#*/}"
                backup_repo "${OWNER}-${NAME}" "$NAME" "$REPO"
              done
            done
          }

          process_repositories() {
            mapfile -t REPOS < <(yq -r '.repositories.repo0[]' repositories.yaml 2>/dev/null || true)

            for REPO in "${REPOS[@]}"; do
              NAME="${REPO#*/}"
              backup_repo "$NAME" "$NAME" "$REPO"
            done
          }

          process_allrepositories
          process_repositories
