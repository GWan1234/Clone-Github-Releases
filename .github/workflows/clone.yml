name: Clone Backup Repositories

on:
  schedule:
    - cron: "0 0 */3 * *"
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true
          
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y jq yq gh git curl p7zip-full coreutils

      - name: Run backup
        env:
          GITHUB_TOKEN: ${{ secrets.MY_TOKEN }}
        run: |
          set -euo pipefail
          export GIT_TERMINAL_PROMPT=0

          # =========================
          # 时间
          # =========================
          NOW_DATE=$(date +"%Y%m%d")
          NOW_TIME=$(date +"%H%M")
          NOW_HUMAN=$(date +"%Y-%m-%d %H:%M")

          # =========================
          # 安全函数
          # =========================
          safe() {
            local v="${1:-unknown}"
            if [[ -z "$v" || "$v" == "null" || "$v" == "-" || "$v" == "none" ]]; then
              echo "unknown"
            else
              echo "$v"
            fi
          }

          sanitize() {
            echo "$1" \
              | tr '/' '-' \
              | tr '[:upper:]' '[:lower:]' \
              | sed 's/[^a-z0-9._-]/-/g' \
              | sed 's/-\+/-/g' \
              | sed 's/^-//;s/-$//'
          }

          cleanup() {
            rm -rf tmp *.7z* *.sha256 up-* 2>/dev/null || true
          }

          auth_url() {
            echo "https://x-access-token:${GITHUB_TOKEN}@github.com/$1.git"
          }

          fetch_repo_info() {
            curl -fsSL \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              "https://api.github.com/repos/$1" \
              2>/dev/null || echo '{}'
          }

          fetch_latest_release() {
            curl -fsSL \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              "https://api.github.com/repos/$1/releases/latest" \
              2>/dev/null || echo '{}'
          }

          release_exists() {
            gh release view "$1" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1
          }

          human_size() {
            numfmt --to=iec --suffix=B "$1" 2>/dev/null || echo "0B"
          }

          # =========================
          # release notes
          # =========================
          build_notes() {
            REPO="$1"
            REPO_JSON="$2"
            BRANCH_COUNT="$3"
            ARCHIVE_SIZE="$4"
            RELEASE_TIME="$5"
            UPSTREAM_JSON="$6"

            REPO_URL=$(safe "$(echo "$REPO_JSON" | jq -r '.html_url // "unknown"' 2>/dev/null)")
            DESC=$(safe "$(echo "$REPO_JSON" | jq -r '.description // "none"' 2>/dev/null)")
            DEF_BRANCH=$(safe "$(echo "$REPO_JSON" | jq -r '.default_branch // "unknown"' 2>/dev/null)")
            LANG=$(safe "$(echo "$REPO_JSON" | jq -r '.language // "unknown"' 2>/dev/null)")
            STARS=$(safe "$(echo "$REPO_JSON" | jq -r '.stargazers_count // 0' 2>/dev/null)")
            FORKS=$(safe "$(echo "$REPO_JSON" | jq -r '.forks_count // 0' 2>/dev/null)")

            CREATED=$(safe "$(echo "$REPO_JSON" | jq -r '.created_at // "unknown"' 2>/dev/null)")
            UPDATED=$(safe "$(echo "$REPO_JSON" | jq -r '.updated_at // "unknown"' 2>/dev/null)")
            PUSHED=$(safe "$(echo "$REPO_JSON" | jq -r '.pushed_at // "unknown"' 2>/dev/null)")

            UP_TAG=$(safe "$(echo "$UPSTREAM_JSON" | jq -r '.tag_name // "none"' 2>/dev/null)")
            UP_NAME=$(safe "$(echo "$UPSTREAM_JSON" | jq -r '.name // "none"' 2>/dev/null)")
            UP_TIME=$(safe "$(echo "$UPSTREAM_JSON" | jq -r '.published_at // "none"' 2>/dev/null)")

            printf -- "## 📦 Repository Info\n"
            printf -- "- URL: %s\n" "$REPO_URL"
            printf -- "- Description: %s\n" "$DESC"
            printf -- "- Default branch: %s\n" "$DEF_BRANCH"
            printf -- "- Language: %s\n" "$LANG"
            printf -- "- Stars: %s | Forks: %s\n" "$STARS" "$FORKS"
            printf -- "\n"

            printf -- "## 🕒 Source Timeline\n"
            printf -- "- Created: %s\n" "$CREATED"
            printf -- "- Updated: %s\n" "$UPDATED"
            printf -- "- Pushed: %s\n" "$PUSHED"
            printf -- "\n"

            printf -- "## 🏷 Upstream Release\n"
            printf -- "- Tag: %s\n" "$UP_TAG"
            printf -- "- Name: %s\n" "$UP_NAME"
            printf -- "- Published: %s\n" "$UP_TIME"
            printf -- "\n"

            printf -- "## 📊 Backup Info\n"
            printf -- "- Branch count: %s\n" "$BRANCH_COUNT"
            printf -- "- Archive size: %s\n" "$(human_size "$ARCHIVE_SIZE")"
            printf -- "- Backup time: %s\n" "$RELEASE_TIME"
          }

          # =========================
          # backup core
          # =========================
          backup_repo() {
            REPO="$1"

            echo "==== BACKUP: $REPO ===="

            cleanup
            mkdir -p tmp

            REPO_SLUG=$(sanitize "$REPO")
            TAG="${REPO_SLUG}-${NOW_DATE}-${NOW_TIME}"
            TAG=$(sanitize "$TAG")

            if release_exists "$TAG"; then
              echo "Skip: $TAG"
              return 0
            fi

            REPO_JSON=$(fetch_repo_info "$REPO")
            UPSTREAM_JSON=$(fetch_latest_release "$REPO")

            MIRROR="tmp/${REPO_SLUG}.git"
            EXPORT="tmp/export/${REPO_SLUG}"

            # 1. 源码镜像克隆
            git clone --mirror "$(auth_url "$REPO")" "$MIRROR" >/dev/null 2>&1 || {
              echo "clone failed"
              return 0
            }

            mapfile -t BRANCHES < <(
              git -C "$MIRROR" for-each-ref --format='%(refname:short)' refs/heads
            )

            mkdir -p "$EXPORT"
            FILES=()
            IDX=0

            # 2. 源码打包
            for B in "${BRANCHES[@]}"; do
              B_SLUG=$(sanitize "$B")
              DIR="${EXPORT}/${B_SLUG}"
              mkdir -p "$DIR"

              git -C "$MIRROR" archive "$B" | tar -xf - -C "$DIR"

              ARCHIVE="${REPO_SLUG}-${B_SLUG}-${IDX}.7z"
              7z a -t7z -mx=5 -mmt=2 "$ARCHIVE" "$DIR" >/dev/null || true
              sha256sum "$ARCHIVE" > "$ARCHIVE.sha256"

              FILES+=("$ARCHIVE" "$ARCHIVE.sha256")
              IDX=$((IDX + 1))
            done

            TOTAL_SIZE=$(ls *.7z 2>/dev/null | xargs -I{} stat -c%s "{}" 2>/dev/null | awk '{s+=$1} END {print s+0}')
            TOTAL_SIZE=${TOTAL_SIZE:-0}

            # 3. 创建 Release (使用第一个源码包初始化)
            NOTES_FILE=$(mktemp)
            build_notes "$REPO" "$REPO_JSON" "${#BRANCHES[@]}" "$TOTAL_SIZE" "$NOW_HUMAN" "$UPSTREAM_JSON" > "$NOTES_FILE"

            echo "Creating release $TAG..."
            gh release create "$TAG" \
              "${FILES[0]}" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$REPO_SLUG ($NOW_HUMAN)" \
              --notes-file "$NOTES_FILE"

            # 4. 上传剩余源码包
            for ((i=1; i<${#FILES[@]}; i++)); do
              echo "Uploading source part: ${FILES[$i]}"
              gh release upload "$TAG" "${FILES[$i]}" --repo "$GITHUB_REPOSITORY" --clobber
            done

            # 5. 🔥 核心：逐个同步原仓库 Release Assets
            echo "Checking for upstream release assets..."
            # 提取所有 asset 的文件名和链接
            ASSETS_DATA=$(echo "$UPSTREAM_JSON" | jq -c '.assets[]? | {name: .name, url: .browser_download_url}')

            if [ -n "$ASSETS_DATA" ]; then
              while read -r asset; do
                ASSET_NAME=$(echo "$asset" | jq -r '.name')
                ASSET_URL=$(echo "$asset" | jq -r '.url')
                
                echo "--> Processing Asset: $ASSET_NAME"
                
                # 下载
                curl -LSs -H "Authorization: Bearer ${GITHUB_TOKEN}" -o "up-$ASSET_NAME" "$ASSET_URL"
                
                # 上传到当前备份 Release
                echo "    Uploading to backup..."
                gh release upload "$TAG" "up-$ASSET_NAME" --repo "$GITHUB_REPOSITORY" --clobber
                
                # 立即删除释放空间
                rm -f "up-$ASSET_NAME"
                echo "    Local cleanup done."
              done <<< "$ASSETS_DATA"
            else
              echo "No upstream assets found."
            fi

            rm -f "$NOTES_FILE"
            cleanup
          }

          # =========================
          # runner
          # =========================
          process_all() {
            mapfile -t OWNERS < <(yq -r '.allrepositories[]' repositories.yaml 2>/dev/null || true)

            for O in "${OWNERS[@]}"; do
              echo "Scanning owner: $O"
              mapfile -t LIST < <(
                curl -fsSL \
                  -H "Authorization: Bearer ${GITHUB_TOKEN}" \
                  "https://api.github.com/users/$O/repos?per_page=100" \
                | jq -r '.[] | select(.private==false) | .full_name'
              )

              for R in "${LIST[@]}"; do
                backup_repo "$R"
              done
            done
          }

          process_all