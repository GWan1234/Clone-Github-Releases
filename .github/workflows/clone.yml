name: Clone Backup Repositories

on:
  schedule:
    - cron: "0 0 */3 * *"
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.MY_TOKEN }}

      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y jq yq gh git curl p7zip-full coreutils bc

      - name: Run backup
        env:
          GITHUB_TOKEN: ${{ secrets.MY_TOKEN }}
        run: |
          set -euo pipefail
          export GIT_TERMINAL_PROMPT=0
          shopt -s nullglob globstar

          # =========================
          # 时间配置
          # =========================
          NOW_DATE=$(date +"%Y%m%d")
          NOW_TIME=$(date +"%H%M")
          NOW_HUMAN=$(date +"%Y-%m-%d %H:%M")
          TRACKING_FILE="commit-tracking-${NOW_DATE}.yaml"

          # 永远使用上一个历史文件做对比
          LAST_TRACKING_FILE=$(ls -1 commit-tracking-*.yaml 2>/dev/null | sort -r | head -n1 || true)

          # =========================
          # 安全函数
          # =========================
          safe() {
            local v="${1:-unknown}"
            if [[ -z "$v" || "$v" == "null" || "$v" == "-" || "$v" == "none" ]]; then
              echo "unknown"
            else
              echo "$v"
            fi
          }

          sanitize() {
            echo "$1" \
              | tr '/' '-' \
              | tr '[:upper:]' '[:lower:]' \
              | sed 's/[^a-z0-9._-]/-/g' \
              | sed 's/-\+/-/g' \
              | sed 's/^-//;s/-$//'
          }

          cleanup() {
            rm -rf tmp *.7z* *.sha256 up-* core.* .gitignore .DS_Store 2>/dev/null || true
            df -h
          }

          auth_url() {
            echo "https://x-access-token:${GITHUB_TOKEN}@github.com/$1.git"
          }

          fetch_repo_info() {
            curl -fsSL --retry 2 --max-time 15 \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              "https://api.github.com/repos/$1" \
              2>/dev/null || echo '{}'
          }

          fetch_latest_release() {
            curl -fsSL --retry 2 --max-time 15 \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              "https://api.github.com/repos/$1/releases/latest" \
              2>/dev/null || echo '{}'
          }

          release_exists() {
            gh release view "$1" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1
          }

          human_size() {
            numfmt --to=iec --suffix=B "$1" 2>/dev/null || echo "0B"
          }

          # ✅【修复】上传失败返回错误码，不再吞错误
          safe_upload() {
            local file="$1"
            local tag="$2"
            if [[ -f "$file" && -s "$file" ]]; then
              echo "Uploading: $file"
              if ! gh release upload "$tag" "$file" --repo "$GITHUB_REPOSITORY" --clobber 2>/dev/null; then
                echo "❌ UPLOAD FAILED: $file"
                return 1
              fi
            fi
            return 0
          }

          set_tracking() {
            local repo="$1"
            local state="$2"
            if [[ ! -f "$TRACKING_FILE" ]]; then
              echo "commit-tracking: $NOW_HUMAN" > "$TRACKING_FILE"
            fi
            yq -y -i --arg repo "$repo" --arg state "$state" '.[$repo] = $state' "$TRACKING_FILE"
          }

          sync_tracking() {
            echo -e "\n💾 Syncing tracking file to GitHub..."
            git config --global user.name "Action"
            git config --global user.email "action@github.com"
          
            # ✅【终极稳】自动暂存本地修改 → 拉取 → 恢复，永远不冲突
            if ! git pull --rebase --autostash origin HEAD; then
              echo "❌ Tracking pull/rebase failed"
              return 1
            fi
          
            # 现在本地是最新的，再提交修改
            git add "$TRACKING_FILE"
            git commit -m "track sync: $NOW_HUMAN" 2>/dev/null || true
          
            if ! git push origin HEAD; then
              echo "❌ Tracking push failed"
              return 1
            fi
          
            echo "✅ Tracking file synced"
            return 0
          }

          # =========================
          # 核心：获取 5 个分支 commit + 最新 release 的真实 tag SHA
          # 【修复】分支列表支持全部分页遍历，不会漏掉后面的分支
          # =========================
          get_repo_current_state() {
            local repo="$1"
            local repo_json="$2"
            local release_json="$3"
          
            # 1. 分页获取全部分支
            local all_branches=()
            local page=1
            while true; do
              local page_branches
              page_branches=$(curl -fsSL --retry 1 --max-time 20 \
                -H "Authorization: Bearer ${GITHUB_TOKEN}" \
                "https://api.github.com/repos/$repo/branches?per_page=100&page=${page}" 2>/dev/null || echo "[]")
          
              if [[ "$(echo "$page_branches" | jq -r '. | length')" -eq 0 ]]; then
                break
              fi
          
              local page_items
              mapfile -t page_items < <(echo "$page_branches" | jq -c '.[]')
              all_branches+=("${page_items[@]}")
              page=$((page + 1))
            done
          
            # 2. 按提交时间倒序排序（最新在前）
            # 注意：GitHub API 返回的 branches 默认是按 pushed 最新排序
            # 这里我们直接取前 5 个
            local branch_states=""
            local count=0
            printf "%s\n" "${all_branches[@]}" \
              | jq -s 'sort_by(.commit.commit.author.date) | reverse | .[]' -c \
              | while read -r br; do
                if [[ $count -ge 10 ]]; then break; fi
                local name sha
                name=$(echo "$br" | jq -r '.name // ""')
                sha=$(echo "$br" | jq -r '.commit.sha // ""')
                if [[ -n "$name" && -n "$sha" && "$name" != "null" ]]; then
                  branch_states+="${name}:${sha};"
                  count=$((count + 1))
                fi
              done
          
            # 3. 【修复】通过 tag 获取真实 commit SHA（唯一正确方式）
            local rel_tag rel_time rel_commit
            rel_tag=$(echo "$release_json" | jq -r '.tag_name // "none"' 2>/dev/null || echo "none")
            rel_time=$(echo "$release_json" | jq -r '.published_at // "none"' 2>/dev/null || echo "none")
          
            if [[ "$rel_tag" != "none" ]]; then
              rel_commit=$(git ls-remote "$(auth_url "$repo")" "refs/tags/$rel_tag" 2>/dev/null | awk '{print $1}' | head -n1)
              rel_commit=${rel_commit:-none}
            else
              rel_commit="none"
            fi
          
            echo "BRANCHES:[${branch_states}]|RELEASE:[${rel_tag}|${rel_commit}|${rel_time}]"
          }

          # =========================
          # 核心：只要任意一个变化 → 必须备份
          # =========================
          need_backup() {
            local repo="$1"
            local current_state="$2"

            # 如果没有历史记录 → 必须备份
            if [[ -z "$LAST_TRACKING_FILE" || ! -f "$LAST_TRACKING_FILE" ]]; then
              return 0
            fi

            # 对比历史状态
            local last_state
            last_state=$(yq -r --arg repo "$repo" '.[$repo] // ""' "$LAST_TRACKING_FILE" 2>/dev/null || true)

            # 不一样 = 需要备份
            if [[ "$last_state" != "$current_state" ]]; then
              return 0
            fi

            # 完全一样 = 跳过备份
            return 1
          }

          build_notes() {
            REPO="$1"
            REPO_JSON="$2"
            BRANCH_COUNT="$3"
            ARCHIVE_SIZE="$4"
            RELEASE_TIME="$5"
            UPSTREAM_JSON="$6"

            REPO_URL=$(safe "$(echo "$REPO_JSON" | jq -r '.html_url // "unknown"' 2>/dev/null)")
            DESC=$(safe "$(echo "$REPO_JSON" | jq -r '.description // "none"' 2>/dev/null)")
            DEF_BRANCH=$(safe "$(echo "$REPO_JSON" | jq -r '.default_branch // "unknown"' 2>/dev/null)")
            LANG=$(safe "$(echo "$REPO_JSON" | jq -r '.language // "unknown"' 2>/dev/null)")
            STARS=$(safe "$(echo "$REPO_JSON" | jq -r '.stargazers_count // 0' 2>/dev/null)")
            FORKS=$(safe "$(echo "$REPO_JSON" | jq -r '.forks_count // 0' 2>/dev/null)")

            CREATED=$(safe "$(echo "$REPO_JSON" | jq -r '.created_at // "unknown"' 2>/dev/null)")
            UPDATED=$(safe "$(echo "$REPO_JSON" | jq -r '.updated_at // "unknown"' 2>/dev/null)")
            PUSHED=$(safe "$(echo "$REPO_JSON" | jq -r '.pushed_at // "unknown"' 2>/dev/null)")

            UP_TAG=$(safe "$(echo "$UPSTREAM_JSON" | jq -r '.tag_name // "none"' 2>/dev/null)")
            UP_NAME=$(safe "$(echo "$UPSTREAM_JSON" | jq -r '.name // "none"' 2>/dev/null)")
            UP_TIME=$(safe "$(echo "$UPSTREAM_JSON" | jq -r '.published_at // "none"' 2>/dev/null)")

            printf -- "## 📦 Repository Info\n"
            printf -- "- URL: %s\n" "$REPO_URL"
            printf -- "- Description: %s\n" "$DESC"
            printf -- "- Default branch: %s\n" "$DEF_BRANCH"
            printf -- "- Language: %s\n" "$LANG"
            printf -- "- Stars: %s | Forks: %s\n" "$STARS" "$FORKS"
            printf -- "\n"

            printf -- "## 🕒 Source Timeline\n"
            printf -- "- Created: %s\n" "$CREATED"
            printf -- "- Updated: %s\n" "$UPDATED"
            printf -- "- Pushed: %s\n" "$PUSHED"
            printf -- "\n"

            printf -- "## 🏷 Upstream Release\n"
            printf -- "- Tag: %s\n" "$UP_TAG"
            printf -- "- Name: %s\n" "$UP_NAME"
            printf -- "- Published: %s\n" "$UP_TIME"
            printf -- "\n"

            printf -- "## 📊 Backup Info\n"
            printf -- "- Branch count: %s\n" "$BRANCH_COUNT"
            printf -- "- Archive size: %s\n" "$(human_size "$ARCHIVE_SIZE")"
            printf -- "- Backup time: %s\n" "$RELEASE_TIME"
            printf -- "\n## 🔍 Incremental Backup\n"
            printf -- "- Track 5 latest branches commits\n"
            printf -- "- Track latest release commit & tag\n"
            printf -- "- Backup triggered by any change"
          }

          # =========================
          # 获取一个用户/组织的全部 public repo
          # =========================
          get_all_repos() {
            local owner="$1"
            
            local user_info
            user_info=$(curl -sSL -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              "https://api.github.com/users/$owner")
            
            local type
            type=$(echo "$user_info" | jq -r '.type // empty')

            if [[ -z "$type" ]]; then
              echo "❌ Error: Could not resolve owner type for $owner." >&2
              return 0
            fi

            local api_endpoint
            if [[ "$type" == "Organization" ]]; then
              api_endpoint="orgs/$owner/repos"
            else
              api_endpoint="users/$owner/repos"
            fi

            local page=1
            while true; do
              local data
              data=$(curl -sSL -H "Authorization: Bearer ${GITHUB_TOKEN}" \
                "https://api.github.com/${api_endpoint}?per_page=100&page=$page")

              local is_array
              is_array=$(echo "$data" | jq 'if type=="array" then true else false end')
              if [[ "$is_array" != "true" ]]; then
                echo "❌ API Error fetching repos for $owner (Page $page)" >&2
                break
              fi

              local count
              count=$(echo "$data" | jq 'length')
              [[ "$count" == "0" ]] && break

              echo "$data" | jq -r '.[] | select(.private==false) | .full_name'
              page=$((page + 1))
            done
          }

          backup_repo() {
            local REPO="$1"
            echo -e "\n====================================="
            echo "==== BACKUP: $REPO ===="
            echo "====================================="

            cleanup
            mkdir -p tmp
            local error_occurred=0

            local REPO_SLUG TAG
            REPO_SLUG=$(sanitize "$REPO")
            TAG="${REPO_SLUG}-${NOW_DATE}-${NOW_TIME}"
            TAG=$(sanitize "$TAG")

            if release_exists "$TAG"; then
              echo "✅ Skip: $TAG (already exists)"
              cleanup
              return 0
            fi

            local REPO_JSON UPSTREAM_JSON
            REPO_JSON=$(fetch_repo_info "$REPO")
            UPSTREAM_JSON=$(fetch_latest_release "$REPO")

            local CURRENT_STATE
            CURRENT_STATE=$(get_repo_current_state "$REPO" "$REPO_JSON" "$UPSTREAM_JSON")

            # 关键：判断是否需要备份
            if ! need_backup "$REPO" "$CURRENT_STATE"; then
              echo "✅ Skip: $REPO (no changes)"
              cleanup
              return 0
            fi

            echo "🔴 Backup needed: $REPO (changes detected)"

            local MIRROR EXPORT
            MIRROR="tmp/${REPO_SLUG}.git"
            EXPORT="tmp/export/${REPO_SLUG}"
            mkdir -p "$EXPORT"

            echo "🔽 Cloning repository..."
            git clone --mirror "$(auth_url "$REPO")" "$MIRROR" >/dev/null 2>&1 || {
              echo "❌ Clone failed, skip repo"
              cleanup
              return 0
            }

            mapfile -t BRANCHES < <(
              git -C "$MIRROR" for-each-ref \
                --sort=-committerdate \
                --format='%(refname:short)' \
                refs/heads 2>/dev/null || true
            )
            BRANCHES=("${BRANCHES[@]:0:10}")

            if [[ ${#BRANCHES[@]} -eq 0 ]]; then
              echo "❌ No branches found, skip"
              cleanup
              return 0
            fi

            echo "📦 Packaging ${#BRANCHES[@]} branches..."
            FILES=()
            IDX=0

            for B in "${BRANCHES[@]}"; do
              B_SLUG=$(sanitize "$B")
              DIR="${EXPORT}/${B_SLUG}"
              mkdir -p "$DIR"

              git -C "$MIRROR" archive "$B" | tar -xf - -C "$DIR" 2>/dev/null || continue

              ARCHIVE="${REPO_SLUG}-${B_SLUG}-${IDX}.7z"
              7z a -t7z -mx5 -mmt2 "$ARCHIVE" "$DIR" >/dev/null 2>&1 || true
              [[ -f "$ARCHIVE" && -s "$ARCHIVE" ]] && sha256sum "$ARCHIVE" > "$ARCHIVE.sha256" 2>/dev/null || true

              [[ -f "$ARCHIVE" ]] && FILES+=("$ARCHIVE" "$ARCHIVE.sha256")
              IDX=$((IDX + 1))
            done

            if [[ ${#FILES[@]} -eq 0 ]]; then
              echo "❌ No packages generated, skip release"
              cleanup
              return 0
            fi

            local TOTAL_SIZE=0
            for f in *.7z; do
              [[ -f "$f" ]] && TOTAL_SIZE=$((TOTAL_SIZE + $(stat -c%s "$f" 2>/dev/null || echo 0)))
            done

            echo "🚀 Creating release: $TAG"
            NOTES_FILE=$(mktemp)
            build_notes "$REPO" "$REPO_JSON" "${#BRANCHES[@]}" "$TOTAL_SIZE" "$NOW_HUMAN" "$UPSTREAM_JSON" > "$NOTES_FILE"

            FIRST_FILE="${FILES[0]}"
            # ✅【修复】release 创建失败直接终止，不写 tracking
            if ! gh release create "$TAG" "$FIRST_FILE" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$REPO_SLUG ($NOW_HUMAN)" \
              --notes-file "$NOTES_FILE" 2>/dev/null; then
              echo "❌ Release create failed → ABORT"
              error_occurred=1
              rm -f "$NOTES_FILE"
              cleanup
              return 0
            fi
            echo "✅ Release created successfully"

            # ✅【修复】上传失败标记错误
            echo "📤 Uploading ${#FILES[@]} files..."
            for ((i=1; i<${#FILES[@]}; i++)); do
              if ! safe_upload "${FILES[$i]}" "$TAG"; then
                error_occurred=1
              fi
            done

            # ✅【修复】上游资产上传失败标记错误
            echo "🔗 Sync upstream assets..."
            ASSETS_DATA=$(echo "$UPSTREAM_JSON" | jq -c '.assets[]? | select(.name != null and .browser_download_url != null)' 2>/dev/null || true)
            if [[ -n "$ASSETS_DATA" ]]; then
              while read -r asset; do
                [[ -z "$asset" ]] && continue
                ASSET_NAME=$(echo "$asset" | jq -r '.name' 2>/dev/null || continue)
                ASSET_URL=$(echo "$asset" | jq -r '.browser_download_url' 2>/dev/null || continue)

                echo "--> Asset: $ASSET_NAME"
                curl -LSs --retry 1 --max-time 30 -o "up-$ASSET_NAME" "$ASSET_URL" 2>/dev/null || continue
                if [[ -f "up-$ASSET_NAME" && -s "up-$ASSET_NAME" ]]; then
                  if ! safe_upload "up-$ASSET_NAME" "$TAG"; then
                    error_occurred=1
                  fi
                fi
                rm -f "up-$ASSET_NAME"
              done <<< "$ASSETS_DATA"
            fi

            rm -f "$NOTES_FILE"

            # ✅【终极修复】只有 100% 成功才写入 tracking
            if [[ $error_occurred -eq 0 ]]; then
              echo "✅ Backup 100% SUCCESS → writing tracking"
              local SIZE_GB=$(echo "scale=2; $TOTAL_SIZE / 1024 / 1024 / 1024" | bc)
              local FINAL_STATE="${CURRENT_STATE}|SIZE:${SIZE_GB}GB"
              set_tracking "$REPO" "$FINAL_STATE"
              if ! sync_tracking; then
                echo "❌ WARNING: Tracking sync failed"
                error_occurred=1
              fi
            else
              echo "❌ Backup FAILED → NO tracking write"
            fi

            cleanup
            [[ $error_occurred -eq 0 ]] && echo "✅ Backup success: $REPO" || echo "⚠️ Backup finished with warnings"
          }

          process_all() {
            # 1) allrepositories
            mapfile -t OWNERS < <(
              yq -r '.allrepositories[]?' repositories.yaml 2>/dev/null \
              | grep -v '^[[:space:]]*#' \
              | sed '/^[[:space:]]*$/d' || true
            )

            for O in "${OWNERS[@]}"; do
              [[ -z "$O" ]] && continue
              echo -e "\n====================================="
              echo "==== Scanning owner: $O ===="
              echo "====================================="

              mapfile -t REPOS < <(get_all_repos "$O" | grep -v '^$' || true)
              [[ ${#REPOS[@]} -eq 0 ]] && { echo "ℹ️ No public repos found"; continue; }

              for R in "${REPOS[@]}"; do
                backup_repo "$R"
              done
            done

            # 2) repositories ✅【修复】遍历所有真实存在的 key，永不中断
            echo -e "\n====================================="
            echo "==== Processing manual repositories ===="
            echo "====================================="

            mapfile -t ALL_KEYS < <(
              yq -r '.repositories | keys[]' repositories.yaml 2>/dev/null \
              | grep -v '^[[:space:]]*#' \
              | sed '/^[[:space:]]*$/d' || true
            )

            for KEY in "${ALL_KEYS[@]}"; do
              echo "➡️ Group: $KEY"
              mapfile -t REPOS < <(
              yq -r --arg key "$KEY" '.repositories[$key] // [] | .[]' repositories.yaml 2>/dev/null \
              | grep -v '^[[:space:]]*#' \
              | sed '/^[[:space:]]*$/d' || true
            )


              for R in "${REPOS[@]}"; do
                [[ -z "$R" ]] && continue
                backup_repo "$R"
              done
            done
          }

          process_all
          echo -e "\n🎉 All done"