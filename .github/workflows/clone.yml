name: Clone Backup Repositories

on:
  schedule:
    - cron: "0 0 */3 * *"
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y jq yq gh git curl p7zip-full coreutils

      - name: Run backup
        env:
          GITHUB_TOKEN: ${{ secrets.MY_TOKEN }}
        run: |
          set -euo pipefail
          export GIT_TERMINAL_PROMPT=0

          NOW_DATE=$(date +"%Y%m%d")
          NOW_TIME=$(date +"%H%M")
          NOW_HUMAN=$(date +"%Y-%m-%d %H:%M")

          MAX_RELEASE_BYTES=$((10 * 1024 * 1024 * 1024))
          VOL_SIZE="1900m"

          safe() {
            local v="${1:-unknown}"
            [[ -z "$v" || "$v" == "null" ]] && echo "unknown" || echo "$v"
          }

          sanitize() {
            echo "$1" | tr '/' '-' | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9._-]/-/g'
          }

          auth_url() {
            echo "https://x-access-token:${GITHUB_TOKEN}@github.com/$1.git"
          }

          fetch_repo_info() {
            curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
              "https://api.github.com/repos/$1"
          }

          fetch_release() {
            curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
              "https://api.github.com/repos/$1/releases/latest"
          }

          release_exists() {
            gh release view "$1" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1
          }

          upload() {
            gh release upload "$1" "$2" \
              --repo "$GITHUB_REPOSITORY" \
              --clobber >/dev/null
          }

          human_size() {
            numfmt --to=iec --suffix=B "$1" 2>/dev/null || echo "0B"
          }

          save_state() {
            jq -n \
              --argjson next "$1" \
              --argjson seq "$2" \
              --argjson done "$3" \
              --arg tag "$4" \
              '{next_index:$next,batch_seq:$seq,completed:$done,tag:$tag}' \
              > "$5"
          }

          download_batch() {
            local json="$1"
            local start="$2"
            local out="$3"
            local manifest="$4"

            mkdir -p "$out"
            : > "$manifest"

            local total bytes=0 count=0 end=$start
            total=$(jq '.assets | length' <<<"$json")

            echo "[" >> "$manifest"

            for ((i=start;i<total;i++)); do
              name=$(jq -r ".assets[$i].name" <<<"$json")
              size=$(jq -r ".assets[$i].size" <<<"$json")
              url=$(jq -r ".assets[$i].browser_download_url" <<<"$json")

              if (( count > 0 && bytes + size > MAX_RELEASE_BYTES )); then
                break
              fi

              file=$(printf "%04d-%s" "$i" "$(sanitize "$name")")

              curl -L -H "Authorization: Bearer $GITHUB_TOKEN" \
                "$url" -o "$out/$file"

              [[ $count -gt 0 ]] && echo "," >> "$manifest"

              jq -nc \
                --arg i "$i" \
                --arg n "$name" \
                --arg f "$file" \
                --argjson s "$size" \
                '{index:($i|tonumber),name:$n,file:$f,size:$s}' >> "$manifest"

              bytes=$((bytes+size))
              count=$((count+1))
              end=$((i+1))
            done

            echo "]" >> "$manifest"

            printf "%s %s %s %s\n" "$count" "$bytes" "$end" "$total"
          }

          backup_repo() {
            repo="$1"
            echo "==== BACKUP $repo ===="

            repo_slug=$(sanitize "$repo")

            # ======================
            # 🔥 原始信息采集
            # ======================
            REPO_JSON=$(fetch_repo_info "$repo")
            UPSTREAM_JSON=$(fetch_release "$repo")

            UP_TAG=$(safe "$(echo "$UPSTREAM_JSON" | jq -r '.tag_name // "none"' 2>/dev/null)")

            tag="bk-${repo_slug}-${NOW_DATE}-${NOW_TIME}"

            gh release create "$tag" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$repo_slug backup $NOW_HUMAN" \
              --notes "auto backup" >/dev/null

            # ======================
            # 🔥 统计变量初始化
            # ======================
            BRANCH_COUNT=0
            ARCHIVE_SIZE=0
            RELEASE_TIME=$(date +"%Y-%m-%d %H:%M:%S")

            # ======================
            # build_notes 函数（包含所有详细信息）
            # ======================
            build_notes() {
              REPO_URL=$(safe "$(echo "$REPO_JSON" | jq -r '.html_url // "unknown"' 2>/dev/null)")
              DESC=$(safe "$(echo "$REPO_JSON" | jq -r '.description // "none"' 2>/dev/null)")
              DEF_BRANCH=$(safe "$(echo "$REPO_JSON" | jq -r '.default_branch // "unknown"' 2>/dev/null)")
              LANG=$(safe "$(echo "$REPO_JSON" | jq -r '.language // "unknown"' 2>/dev/null)")
              STARS=$(safe "$(echo "$REPO_JSON" | jq -r '.stargazers_count // 0' 2>/dev/null)")
              FORKS=$(safe "$(echo "$REPO_JSON" | jq -r '.forks_count // 0' 2>/dev/null)")

              CREATED=$(safe "$(echo "$REPO_JSON" | jq -r '.created_at // "unknown"' 2>/dev/null)")
              UPDATED=$(safe "$(echo "$REPO_JSON" | jq -r '.updated_at // "unknown"' 2>/dev/null)")
              PUSHED=$(safe "$(echo "$REPO_JSON" | jq -r '.pushed_at // "unknown"' 2>/dev/null)")

              UP_TAG=$(safe "$(echo "$UPSTREAM_JSON" | jq -r '.tag_name // "none"' 2>/dev/null)")
              UP_NAME=$(safe "$(echo "$UPSTREAM_JSON" | jq -r '.name // "none"' 2>/dev/null)")
              UP_TIME=$(safe "$(echo "$UPSTREAM_JSON" | jq -r '.published_at // "none"' 2>/dev/null)")

              printf "## 📦 Repository Info\n"
              printf -- "- URL: %s\n" "$REPO_URL"
              printf -- "- Description: %s\n" "$DESC"
              printf -- "- Default branch: %s\n" "$DEF_BRANCH"
              printf -- "- Language: %s\n" "$LANG"
              printf -- "- Stars: %s | Forks: %s\n" "$STARS" "$FORKS"
              printf "\n"

              printf "## 🕒 Source Timeline\n"
              printf -- "- Created: %s\n" "$CREATED"
              printf -- "- Updated: %s\n" "$UPDATED"
              printf -- "- Pushed: %s\n" "$PUSHED"
              printf "\n"

              printf "## 🏷 Upstream Release\n"
              printf -- "- Tag: %s\n" "$UP_TAG"
              printf -- "- Name: %s\n" "$UP_NAME"
              printf -- "- Published: %s\n" "$UP_TIME"
              printf "\n"

              printf "## 📊 Backup Info\n"
              printf -- "- Branch count: %s\n" "$BRANCH_COUNT"
              printf -- "- Archive size: %s\n" "$(human_size "$ARCHIVE_SIZE")"
              printf -- "- Backup time: %s\n" "$RELEASE_TIME"
            }

            # ======================
            # SOURCE BACKUP（分支打包）
            # ======================
            git clone --mirror "$(auth_url "$repo")" repo.git >/dev/null

            mapfile -t branches < <(
              git -C repo.git for-each-ref --format='%(refname:short)' refs/heads
            )

            BRANCH_COUNT=${#branches[@]}

            idx=0
            for b in "${branches[@]}"; do
              dir="work/$b"
              mkdir -p "$dir"

              git -C repo.git archive "$b" | tar -xf - -C "$dir"

              7z a -t7z -mx=5 -mmt=2 -v$VOL_SIZE \
                "out/${repo_slug}-${b}-${idx}.7z" "$dir" >/dev/null

              for f in out/*.7z*; do
                upload "$tag" "$f"
                size=$(stat -c%s "$f" 2>/dev/null || stat -f%z "$f" 2>/dev/null || echo 0)
                ARCHIVE_SIZE=$((ARCHIVE_SIZE + size))
              done

              rm -rf out work
              idx=$((idx+1))
            done

            # ======================
            # RELEASE BACKUP（上游发布资产）
            # ======================
            if [[ "$(jq '.assets|length' <<<"$UPSTREAM_JSON")" -gt 0 ]]; then

              next=0
              seq=1
              done=false
              total=$(jq '.assets|length' <<<"$UPSTREAM_JSON")

              while [[ "$done" == false && "$next" -lt "$total" ]]; do

                mkdir -p batch out

                read count bytes next total < <(
                  download_batch "$UPSTREAM_JSON" "$next" batch manifest.json
                )

                if [[ $count -eq 0 ]]; then
                  break
                fi

                7z a -t7z -mx=5 -mmt=2 -v1900m \
                  "out/${repo_slug}-rel-p${seq}.7z" batch manifest.json >/dev/null

                for f in out/*.7z*; do
                  upload "$tag" "$f"
                  size=$(stat -c%s "$f" 2>/dev/null || stat -f%z "$f" 2>/dev/null || echo 0)
                  ARCHIVE_SIZE=$((ARCHIVE_SIZE + size))
                done

                rm -rf batch out manifest.json

                done=false
                [[ $next -ge $total ]] && done=true

                # 🔧 修正 save_state 调用：添加缺失的 tag 参数
                save_state "$next" "$seq" "$done" "$tag" "state.json"
                upload "$tag" state.json

                seq=$((seq+1))
              done
            fi

            rm -rf repo.git

            # ======================
            # 🔥 更新 Release 描述为完整信息
            # ======================
            build_notes > /tmp/release_notes.md
            gh release edit "$tag" \
              --repo "$GITHUB_REPOSITORY" \
              --notes-file /tmp/release_notes.md
          }

          process_all() {
            mapfile -t OWNERS < <(yq -r '.allrepositories[]' repositories.yaml)

            for owner in "${OWNERS[@]}"; do
              mapfile -t repos < <(
                curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
                  "https://api.github.com/users/$owner/repos?per_page=100" \
                | jq -r '.[].full_name'
              )

              for r in "${repos[@]}"; do
                backup_repo "$r"
              done
            done
          }

          process_all